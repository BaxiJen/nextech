<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="627"/><line x1="60" y1="0" x2="60" y2="627"/>
    <line x1="120" y1="0" x2="120" y2="627"/><line x1="180" y1="0" x2="180" y2="627"/>
    <line x1="240" y1="0" x2="240" y2="627"/><line x1="300" y1="0" x2="300" y2="627"/>
    <line x1="360" y1="0" x2="360" y2="627"/><line x1="420" y1="0" x2="420" y2="627"/>
    <line x1="480" y1="0" x2="480" y2="627"/><line x1="540" y1="0" x2="540" y2="627"/>
    <line x1="600" y1="0" x2="600" y2="627"/><line x1="660" y1="0" x2="660" y2="627"/>
    <line x1="720" y1="0" x2="720" y2="627"/><line x1="780" y1="0" x2="780" y2="627"/>
    <line x1="840" y1="0" x2="840" y2="627"/><line x1="900" y1="0" x2="900" y2="627"/>
    <line x1="960" y1="0" x2="960" y2="627"/><line x1="1020" y1="0" x2="1020" y2="627"/>
    <line x1="1080" y1="0" x2="1080" y2="627"/><line x1="1140" y1="0" x2="1140" y2="627"/>
    <line x1="1200" y1="0" x2="1200" y2="627"/>
  </g>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700" letter-spacing="0.5">Governança de Agentes IA</text>
  <text x="600" y="105" text-anchor="middle" fill="#9CA3AF" font-size="18" font-weight="400">Do Guardrail ao Compliance Auditável</text>

  <!-- Three-layer pyramid diagram -->
  <!-- Layer 3 (top) - Compliance Auditável -->
  <g filter="url(#glow)">
    <polygon points="600,155 720,265 480,265" fill="url(#layer3)" opacity="0.15"/>
    <polygon points="600,155 720,265 480,265" fill="none" stroke="#34D399" stroke-width="2.5"/>
  </g>
  <text x="600" y="220" text-anchor="middle" fill="#34D399" font-size="15" font-weight="700">COMPLIANCE</text>
  <text x="600" y="242" text-anchor="middle" fill="#34D399" font-size="12" font-weight="400">AUDITÁVEL</text>

  <!-- Layer 2 (middle) - Observabilidade -->
  <g filter="url(#glow)">
    <polygon points="480,270 840,270 900,380 420,380" fill="url(#layer2)" opacity="0.12"/>
    <polygon points="480,270 840,270 900,380 420,380" fill="none" stroke="#60A5FA" stroke-width="2.5"/>
  </g>
  <text x="660" y="325" text-anchor="middle" fill="#60A5FA" font-size="15" font-weight="700">OBSERVABILIDADE</text>
  <text x="660" y="350" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="400">Logging · Tracing · Métricas</text>

  <!-- Layer 1 (bottom) - Guardrails -->
  <g filter="url(#glow)">
    <polygon points="420,385 900,385 980,495 340,495" fill="url(#layer1)" opacity="0.12"/>
    <polygon points="420,385 900,385 980,495 340,495" fill="none" stroke="#FB923C" stroke-width="2.5"/>
  </g>
  <text x="660" y="435" text-anchor="middle" fill="#FB923C" font-size="15" font-weight="700">GUARDRAILS</text>
  <text x="660" y="460" text-anchor="middle" fill="#FB923C" font-size="11" font-weight="400">Conteúdo · Ação · Escopo</text>

  <!-- Upward arrows connecting layers -->
  <g stroke="#4B5563" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="360" y1="495" x2="430" y2="385"/>
    <line x1="960" y1="495" x2="890" y2="385"/>
    <line x1="420" y1="380" x2="490" y2="270"/>
    <line x1="900" y1="380" x2="830" y2="270"/>
  </g>
  <!-- Arrow heads -->
  <g fill="#4B5563" opacity="0.6">
    <polygon points="430,385 424,395 436,395"/>
    <polygon points="890,385 884,395 896,395"/>
    <polygon points="490,270 484,280 496,280"/>
    <polygon points="830,270 824,280 836,280"/>
  </g>

  <!-- Left side annotations -->
  <g fill="#6B7280" font-size="11" font-weight="400">
    <text x="60" y="200" fill="#34D399">Trilha de auditoria</text>
    <text x="60" y="218" fill="#34D399">Proveniência</text>
    <text x="60" y="236" fill="#34D399">Supervisão humana</text>

    <text x="60" y="325" fill="#60A5FA">Logging estruturado</text>
    <text x="60" y="343" fill="#60A5FA">Tracing distribuído</text>
    <text x="60" y="361" fill="#60A5FA">Métricas comportamentais</text>

    <text x="60" y="435" fill="#FB923C">Policy-as-Prompt</text>
    <text x="60" y="453" fill="#FB923C">Least privilege</text>
    <text x="60" y="471" fill="#FB923C">Escopo por contexto</text>
  </g>

  <!-- Right side: regulatory badges -->
  <g font-size="12" font-weight="600">
    <!-- EU AI Act -->
    <rect x="990" y="155" rx="6" ry="6" width="170" height="40" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <text x="1075" y="175" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">EU AI Act</text>
    <text x="1075" y="190" text-anchor="middle" fill="#92400E" font-size="9" font-weight="400">Enforcement: Ago 2026</text>

    <!-- ISO 42001 -->
    <rect x="990" y="205" rx="6" ry="6" width="170" height="40" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.7"/>
    <text x="1075" y="225" text-anchor="middle" fill="#8B5CF6" font-size="11" font-weight="600">ISO/IEC 42001</text>
    <text x="1075" y="240" text-anchor="middle" fill="#6D28D9" font-size="9" font-weight="400">AIMS Certificável</text>

    <!-- NIST -->
    <rect x="990" y="255" rx="6" ry="6" width="170" height="40" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.7"/>
    <text x="1075" y="275" text-anchor="middle" fill="#3B82F6" font-size="11" font-weight="600">NIST AI RMF</text>
    <text x="1075" y="290" text-anchor="middle" fill="#1E40AF" font-size="9" font-weight="400">CAISI: Q4 2026</text>

    <!-- LGPD -->
    <rect x="990" y="305" rx="6" ry="6" width="170" height="40" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.7"/>
    <text x="1075" y="325" text-anchor="middle" fill="#10B981" font-size="11" font-weight="600">LGPD</text>
    <text x="1075" y="340" text-anchor="middle" fill="#065F46" font-size="9" font-weight="400">Lei 13.709/2018</text>

    <!-- Marco Legal -->
    <rect x="990" y="355" rx="6" ry="6" width="170" height="40" fill="none" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
    <text x="1075" y="375" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="600">Marco Legal IA</text>
    <text x="1075" y="390" text-anchor="middle" fill="#991B1B" font-size="9" font-weight="400">PL 2338/2023</text>
  </g>

  <!-- Key stat callout -->
  <rect x="340" y="520" rx="8" ry="8" width="520" height="52" fill="#1F2937" stroke="#F97316" stroke-width="1" opacity="0.9"/>
  <text x="600" y="545" text-anchor="middle" fill="#F97316" font-size="14" font-weight="700">82%</text>
  <text x="600" y="563" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="400">das empresas têm agentes de IA fora do radar de segurança (CSA, 2026)</text>

  <!-- BaXiJen branding -->
  <text x="600" y="610" text-anchor="middle" fill="#4B5563" font-size="11" font-weight="400">BaXiJen · Antes de tudo, Brasileiro.</text>
</svg>