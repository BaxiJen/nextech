<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="500" r="200" fill="#2563eb" opacity="0.08"/>
  <circle cx="1100" cy="130" r="180" fill="#06b6d4" opacity="0.08"/>
  <circle cx="600" cy="315" r="300" fill="#2563eb" opacity="0.04"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent)" opacity="0.6"/>
  <!-- BaXiJen logo text -->
  <text x="60" y="80" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.8">BaXiJen</text>
  <!-- Main title -->
  <text x="600" y="280" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">IA Soberana</text>
  <text x="600" y="350" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">para o Brasil</text>
  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">Por que dependência tecnológica é risco estratégico</text>
  <!-- Decorative line -->
  <rect x="540" y="460" width="120" height="3" rx="1.5" fill="url(#accent)"/>
</svg>