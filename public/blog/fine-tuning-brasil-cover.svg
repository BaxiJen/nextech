<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#22D3EE" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="1400" y2="630" stroke="#22D3EE" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="1600" y2="630" stroke="#22D3EE" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="1800" y2="630" stroke="#22D3EE" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#22D3EE" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#22D3EE" stroke-width="0.5"/>
  </g>
  
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- Left section: Title -->
  <text x="60" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#06B6D4" font-weight="600" letter-spacing="4">BaXiJen · BLOG</text>
  
  <text x="60" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="48" fill="#F8FAFC" font-weight="700">
    <tspan x="60" dy="0">Fine-tuning</tspan>
    <tspan x="60" dy="60">no Brasil:</tspan>
  </text>
  
  <text x="60" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#94A3B8" font-weight="400">
    <tspan x="60" dy="0">Custo-benefício de treinar</tspan>
    <tspan x="60" dy="42">vs usar API</tspan>
  </text>
  
  <!-- Flag accent -->
  <rect x="60" y="430" width="80" height="6" fill="#009739"/>
  <rect x="60" y="436" width="80" height="6" fill="#FFDF00"/>
  <rect x="60" y="442" width="80" height="6" fill="#002776"/>
  
  <!-- Author -->
  <text x="60" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B">Leonardo Camilo · CEO &amp; Tech Lead</text>
  
  <!-- Right section: Cost comparison bars -->
  <g transform="translate(680, 80)">
    <!-- Section label -->
    <text x="0" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94A3B8" font-weight="600">CUSTO MENSAL (50K req/dia)</text>
    
    <!-- API bar -->
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#F8FAFC" font-weight="500">API (GPT-4.1 mini)</text>
    <rect x="0" y="90" width="450" height="44" rx="6" fill="url(#red)" opacity="0.9"/>
    <text x="460" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#EF4444" font-weight="700">R$ 3.900</text>
    
    <!-- Cloud GPU bar -->
    <text x="0" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#F8FAFC" font-weight="500">Cloud GPU (Llama 8B)</text>
    <rect x="0" y="180" width="48" height="44" rx="6" fill="url(#gold)" opacity="0.9"/>
    <text x="58" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#F59E0B" font-weight="700">R$ 420</text>
    
    <!-- On-premise bar -->
    <text x="0" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#F8FAFC" font-weight="500">On-premise (RTX 3090)</text>
    <rect x="0" y="270" width="80" height="44" rx="6" fill="url(#green)" opacity="0.9"/>
    <text x="90" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#10B981" font-weight="700">R$ 698</text>
    
    <!-- Savings callout -->
    <rect x="300" y="270" width="180" height="44" rx="6" fill="#10B981" opacity="0.15"/>
    <text x="310" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#10B981" font-weight="600">82% economia vs API</text>
    
    <!-- Breakdown box -->
    <rect x="0" y="350" width="460" height="150" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    
    <text x="20" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#06B6D4" font-weight="600">TÉCNICAS DE FINE-TUNING</text>
    
    <!-- QLoRA -->
    <rect x="20" y="395" width="8" height="8" rx="4" fill="#22D3EE"/>
    <text x="35" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">QLoRA: 4-bit, treina 0,1% dos parâmetros</text>
    
    <!-- LoRA -->
    <rect x="20" y="420" width="8" height="8" rx="4" fill="#10B981"/>
    <text x="35" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">LoRA: rank 32, alpha 64, todos os lineares</text>
    
    <!-- Full -->
    <rect x="20" y="445" width="8" height="8" rx="4" fill="#F59E0B"/>
    <text x="35" y="453" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#CBD5E1">Full fine-tuning: raramente necessário</text>
    
    <!-- Key stat -->
    <text x="20" y="483" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">QLoRA atinge 95-100% do desempenho do full FT</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0F172A" opacity="0.8"/>
  <text x="600" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Antes de tudo, Brasileiro. 🇧🇷</text>
</svg>