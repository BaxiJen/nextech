<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#121838"/>
      <stop offset="100%" stop-color="#0d1229"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1f3d"/>
      <stop offset="100%" stop-color="#141833"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2818"/>
      <stop offset="100%" stop-color="#0a1e14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Left side: Title -->
  <text x="60" y="100" fill="#00d4aa" font-size="16" font-weight="600" letter-spacing="3" text-transform="uppercase">BAXIJEN BLOG</text>
  <text x="60" y="160" fill="#ffffff" font-size="38" font-weight="800" letter-spacing="-0.5">Prompt Engineering</text>
  <text x="60" y="210" fill="#ffffff" font-size="38" font-weight="800" letter-spacing="-0.5">em Produção</text>

  <text x="60" y="260" fill="#a0a8c8" font-size="18" font-weight="400">Por que seu prompt não sobrevive</text>
  <text x="60" y="288" fill="#a0a8c8" font-size="18" font-weight="400">ao mundo real</text>

  <!-- Accent line -->
  <rect x="60" y="310" width="80" height="3" rx="1.5" fill="url(#accent1)"/>

  <!-- Author info -->
  <text x="60" y="350" fill="#6c7a99" font-size="14" font-weight="500">Luiz Felipe Barbedo</text>
  <text x="60" y="370" fill="#4a5568" font-size="12">BD / Comercial, BaXiJen</text>
  <text x="60" y="395" fill="#4a5568" font-size="12">02 de junho de 2026</text>

  <!-- Right side: Visual diagram -->
  <!-- Card: Playground (broken) -->
  <g transform="translate(580, 60)" filter="url(#shadow)">
    <rect width="280" height="230" rx="12" fill="url(#card1)" stroke="#2d3460" stroke-width="1"/>
    <rect width="280" height="40" rx="12" fill="#1e2347"/>
    <rect x="0" y="28" width="280" height="12" fill="#1e2347"/>
    <!-- Red dot -->
    <circle cx="20" cy="20" r="5" fill="#ff6b6b"/>
    <circle cx="36" cy="20" r="5" fill="#ffd93d"/>
    <circle cx="52" cy="20" r="5" fill="#6bff8d"/>
    <text x="140" y="24" fill="#6c7a99" font-size="11" text-anchor="middle" font-weight="600">PLAYGROUND</text>

    <!-- Prompt text lines (messy) -->
    <text x="16" y="62" fill="#ff6b6b" font-size="10" font-family="monospace">&gt; "Responda em JSON"</text>
    <text x="16" y="80" fill="#ff6b6b" font-size="10" font-family="monospace">&gt; "Seja preciso"</text>
    <text x="16" y="98" fill="#ff6b6b" font-size="10" font-family="monospace">&gt; "Não alucine"</text>

    <!-- Broken output -->
    <text x="16" y="128" fill="#4a5568" font-size="9" font-family="monospace">Output:</text>
    <rect x="16" y="136" width="248" height="16" rx="3" fill="#2a1a1a"/>
    <text x="20" y="148" fill="#ff6b6b" font-size="9" font-family="monospace">{ "result": "Aqui vai um te</text>
    <rect x="16" y="156" width="248" height="16" rx="3" fill="#2a1a1a"/>
    <text x="20" y="168" fill="#ff6b6b" font-size="9" font-family="monospace">xto longo que não é JS</text>
    <rect x="16" y="176" width="248" height="16" rx="3" fill="#2a1a1a"/>
    <text x="20" y="188" fill="#ff6b6b" font-size="9" font-family="monospace">ON válido nem nada..."</text>

    <!-- X marks -->
    <text x="250" y="148" fill="#ff6b6b" font-size="14" font-weight="700">✗</text>
    <text x="250" y="168" fill="#ff6b6b" font-size="14" font-weight="700">✗</text>
    <text x="250" y="188" fill="#ff6b6b" font-size="14" font-weight="700">✗</text>

    <text x="140" y="218" fill="#ff6b6b" font-size="11" text-anchor="middle" font-weight="600">❌ Sem validação</text>
  </g>

  <!-- Arrow between cards -->
  <g transform="translate(870, 175)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#00d4aa" stroke-width="2" filter="url(#glow)"/>
    <polygon points="50,-6 62,0 50,6" fill="#00d4aa"/>
    <text x="31" y="-14" fill="#00d4aa" font-size="9" text-anchor="middle" font-weight="600">PIPELINE</text>
  </g>

  <!-- Card: Production (robust) -->
  <g transform="translate(930, 60)" filter="url(#shadow)">
    <rect width="240" height="230" rx="12" fill="url(#card2)" stroke="#1a4a30" stroke-width="1"/>
    <rect width="240" height="40" rx="12" fill="#0f3220"/>
    <rect x="0" y="28" width="240" height="12" fill="#0f3220"/>
    <circle cx="20" cy="20" r="5" fill="#6bff8d"/>
    <circle cx="36" cy="20" r="5" fill="#ffd93d"/>
    <circle cx="52" cy="20" r="5" fill="#00d4aa"/>
    <text x="120" y="24" fill="#6bff8d" font-size="11" text-anchor="middle" font-weight="600">PRODUÇÃO</text>

    <!-- Structured output lines -->
    <text x="14" y="62" fill="#00d4aa" font-size="10" font-family="monospace">Schema: Pydantic</text>
    <text x="14" y="80" fill="#00d4aa" font-size="10" font-family="monospace">Evals: ✓ 142 tests</text>
    <text x="14" y="98" fill="#00d4aa" font-size="10" font-family="monospace">Version: v3.2.1</text>

    <!-- Clean output -->
    <text x="14" y="128" fill="#4a5568" font-size="9" font-family="monospace">Output:</text>
    <rect x="14" y="136" width="212" height="16" rx="3" fill="#0a2618"/>
    <text x="18" y="148" fill="#6bff8d" font-size="9" font-family="monospace">{</text>
    <rect x="14" y="156" width="212" height="16" rx="3" fill="#0a2618"/>
    <text x="18" y="168" fill="#6bff8d" font-size="9" font-family="monospace">  "result": "validado",</text>
    <rect x="14" y="176" width="212" height="16" rx="3" fill="#0a2618"/>
    <text x="18" y="188" fill="#6bff8d" font-size="9" font-family="monospace">  "confidence": 0.97</text>
    <rect x="14" y="196" width="212" height="14" rx="3" fill="#0a2618"/>
    <text x="18" y="207" fill="#6bff8d" font-size="9" font-family="monospace">}</text>

    <!-- Check marks -->
    <text x="214" y="148" fill="#00d4aa" font-size="14" font-weight="700">✓</text>
    <text x="214" y="168" fill="#00d4aa" font-size="14" font-weight="700">✓</text>
    <text x="214" y="188" fill="#00d4aa" font-size="14" font-weight="700">✓</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(580, 310)">
    <rect width="590" height="70" rx="10" fill="#0f1329" stroke="#1e2347" stroke-width="1"/>

    <!-- Stat 1 -->
    <text x="30" y="28" fill="#00d4aa" font-size="22" font-weight="800">&lt;40%</text>
    <text x="30" y="48" fill="#6c7a99" font-size="11">JSON sem structured</text>

    <!-- Divider -->
    <line x1="145" y1="10" x2="145" y2="60" stroke="#1e2347" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="175" y="28" fill="#00d4aa" font-size="22" font-weight="800">100%</text>
    <text x="175" y="48" fill="#6c7a99" font-size="11">Conformidade com schema</text>

    <!-- Divider -->
    <line x1="330" y1="10" x2="330" y2="60" stroke="#1e2347" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="360" y="28" fill="#00d4aa" font-size="22" font-weight="800">75x</text>
    <text x="360" y="48" fill="#6c7a99" font-size="11">Mais barato com DSPy</text>

    <!-- Divider -->
    <line x1="480" y1="10" x2="480" y2="60" stroke="#1e2347" stroke-width="1"/>

    <!-- Stat 4 -->
    <text x="510" y="28" fill="#6c5ce7" font-size="22" font-weight="800">4/5</text>
    <text x="510" y="48" fill="#6c7a99" font-size="11">Casos DSPy &gt; manual</text>
  </g>

  <!-- Bottom feature tags -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="160" height="30" rx="15" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
    <text x="80" y="20" fill="#00d4aa" font-size="12" text-anchor="middle" font-weight="500">Structured Outputs</text>

    <rect x="175" y="0" width="120" height="30" rx="15" fill="none" stroke="#6c5ce7" stroke-width="1" opacity="0.6"/>
    <text x="235" y="20" fill="#a29bfe" font-size="12" text-anchor="middle" font-weight="500">DSPy</text>

    <rect x="310" y="0" width="80" height="30" rx="15" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
    <text x="350" y="20" fill="#00d4aa" font-size="12" text-anchor="middle" font-weight="500">Evals</text>

    <rect x="405" y="0" width="140" height="30" rx="15" fill="none" stroke="#6c5ce7" stroke-width="1" opacity="0.6"/>
    <text x="475" y="20" fill="#a29bfe" font-size="12" text-anchor="middle" font-weight="500">Prompt Registry</text>
  </g>

  <!-- BaXiJen branding -->
  <text x="60" y="520" fill="#2d3460" font-size="40" font-weight="900" letter-spacing="-1">BaXiJen</text>
  <text x="245" y="520" fill="#00d4aa" font-size="14" font-weight="500" letter-spacing="4">ANTES DE TUDO, BRASILEIRO.</text>

  <!-- Decorative corner elements -->
  <rect x="1155" y="15" width="30" height="3" rx="1" fill="#00d4aa" opacity="0.4"/>
  <rect x="1170" y="15" width="3" height="30" rx="1" fill="#00d4aa" opacity="0.4"/>
  <rect x="15" y="600" width="30" height="3" rx="1" fill="#6c5ce7" opacity="0.4"/>
  <rect x="15" y="585" width="3" height="30" rx="1" fill="#6c5ce7" opacity="0.4"/>
</svg>