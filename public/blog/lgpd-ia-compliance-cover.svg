<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#00a5e0"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#007a5e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#00c896" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Shield icon (LGPD/compliance) -->
  <g transform="translate(850, 280)">
    <!-- Shield shape -->
    <path d="M0,-100 L70,-70 L70,20 C70,60 35,100 0,120 C-35,100 -70,60 -70,20 L-70,-70 Z" fill="url(#shield-grad)" opacity="0.9"/>
    <!-- Checkmark inside shield -->
    <path d="M-25,5 L-8,25 L25,-20" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Circuit lines connecting to shield -->
  <g stroke="#00c896" stroke-width="1.5" opacity="0.3">
    <path d="M780,280 L760,280" fill="none"/>
    <circle cx="758" cy="280" r="3" fill="#00c896"/>
    <path d="M920,280 L940,280" fill="none"/>
    <circle cx="942" cy="280" r="3" fill="#00c896"/>
    <path d="M850,160 L850,180" fill="none"/>
    <circle cx="850" cy="158" r="3" fill="#00c896"/>
    <path d="M850,400 L850,420" fill="none"/>
    <circle cx="850" cy="422" r="3" fill="#00c896"/>
  </g>

  <!-- Document/Law icons -->
  <g transform="translate(950, 140)" opacity="0.25">
    <rect x="0" y="0" width="40" height="50" rx="3" fill="none" stroke="#00a5e0" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="32" y2="12" stroke="#00a5e0" stroke-width="1.5"/>
    <line x1="8" y1="22" x2="32" y2="22" stroke="#00a5e0" stroke-width="1.5"/>
    <line x1="8" y1="32" x2="24" y2="32" stroke="#00a5e0" stroke-width="1.5"/>
  </g>

  <g transform="translate(970, 380)" opacity="0.25">
    <rect x="0" y="0" width="40" height="50" rx="3" fill="none" stroke="#00a5e0" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="32" y2="12" stroke="#00a5e0" stroke-width="1.5"/>
    <line x1="8" y1="22" x2="32" y2="22" stroke="#00a5e0" stroke-width="1.5"/>
    <line x1="8" y1="32" x2="24" y2="32" stroke="#00a5e0" stroke-width="1.5"/>
  </g>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Title -->
  <text x="80" y="140" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">
    LGPD e IA:
  </text>
  <text x="80" y="200" fill="#ffffff" font-size="44" font-weight="700" letter-spacing="-0.5">
    Compliance na Prática
  </text>
  <text x="80" y="248" fill="#ffffff" font-size="44" font-weight="700" letter-spacing="-0.5" opacity="0.85">
    para Startups
  </text>

  <!-- Accent line under title -->
  <rect x="80" y="270" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle / Key points -->
  <text x="80" y="310" fill="#b0b0cc" font-size="16" font-weight="400">
    📋 LGPD  ·  PL 2338/2023  ·  Nota Técnica 12/2025  ·  Checklist prático
  </text>

  <!-- Key stats -->
  <g transform="translate(80, 360)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#00c896" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="30" fill="#00c896" font-size="28" font-weight="800" text-anchor="middle">975</text>
    <text x="80" y="52" fill="#8888aa" font-size="11" font-weight="500" text-anchor="middle">startups de IA no Brasil</text>
  </g>

  <g transform="translate(260, 360)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#00a5e0" stroke-width="1" stroke-opacity="0.3"/>
    <text x="80" y="30" fill="#00a5e0" font-size="28" font-weight="800" text-anchor="middle">R$50mi</text>
    <text x="80" y="52" fill="#8888aa" font-size="11" font-weight="500" text-anchor="middle">multa máxima LGPD</text>
  </g>

  <g transform="translate(440, 360)">
    <rect x="0" y="0" width="160" height="70" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-width="1" stroke-opacity="0.2"/>
    <text x="80" y="30" fill="#ffffff" font-size="28" font-weight="800" text-anchor="middle" opacity="0.9">+62%</text>
    <text x="80" y="52" fill="#8888aa" font-size="11" font-weight="500" text-anchor="middle">cresc. invest. IA 2024</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0d0d22"/>
  <text x="80" y="615" fill="#666688" font-size="13" font-weight="500">Blog BaXiJen</text>
  <text x="1200" y="615" fill="#666688" font-size="13" font-weight="500" text-anchor="end">Maio 2026</text>
  <circle cx="600" cy="610" r="3" fill="#00c896" opacity="0.6"/>

  <!-- Author -->
  <text x="80" y="470" fill="#8888aa" font-size="14" font-weight="400">
    Marcus Ramalho  ·  CTO, BaXiJen
  </text>
</svg>