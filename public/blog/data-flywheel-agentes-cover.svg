<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f4e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7b61ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="flywheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="staticGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ee5a24;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- FLYWHEEL CYCLE (left side) -->
  <!-- Central circle for flywheel -->
  <circle cx="320" cy="340" r="160" fill="none" stroke="url(#flywheelGrad)" stroke-width="3" stroke-dasharray="12,6" filter="url(#glow)" opacity="0.8"/>
  <circle cx="320" cy="340" r="120" fill="none" stroke="#00d4aa" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Flywheel nodes -->
  <!-- Top: Produção -->
  <rect x="270" y="155" width="100" height="44" rx="8" fill="#00d4aa" opacity="0.9" filter="url(#softShadow)"/>
  <text x="320" y="182" text-anchor="middle" fill="#0a0e27" font-size="13" font-weight="700">PRODUÇÃO</text>
  
  <!-- Right: Sinais -->
  <rect x="445" y="318" width="90" height="44" rx="8" fill="#00b4d8" opacity="0.9" filter="url(#softShadow)"/>
  <text x="490" y="345" text-anchor="middle" fill="#0a0e27" font-size="13" font-weight="700">SINAIS</text>
  
  <!-- Bottom: Melhoria -->
  <rect x="270" y="490" width="100" height="44" rx="8" fill="#7b61ff" opacity="0.9" filter="url(#softShadow)"/>
  <text x="320" y="517" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">MELHORIA</text>
  
  <!-- Left: Modelo -->
  <rect x="105" y="318" width="90" height="44" rx="8" fill="#00d4aa" opacity="0.9" filter="url(#softShadow)"/>
  <text x="150" y="345" text-anchor="middle" fill="#0a0e27" font-size="13" font-weight="700">MODELO</text>
  
  <!-- Arrows connecting flywheel -->
  <!-- Top to Right -->
  <path d="M370,177 C430,177 445,290 455,318" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.7"/>
  <!-- Right to Bottom -->
  <path d="M490,362 C490,430 370,490 370,512" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.7"/>
  <!-- Bottom to Left -->
  <path d="M270,512 C180,512 145,430 150,362" fill="none" stroke="#7b61ff" stroke-width="2" opacity="0.7"/>
  <!-- Left to Top -->
  <path d="M150,318 C145,240 250,177 270,177" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.7"/>
  
  <!-- Arrow heads -->
  <polygon points="455,318 448,310 462,310" fill="#00d4aa" opacity="0.8"/>
  <polygon points="370,512 362,505 378,505" fill="#00b4d8" opacity="0.8"/>
  <polygon points="150,362 142,355 158,355" fill="#7b61ff" opacity="0.8"/>
  <polygon points="270,177 262,170 278,170" fill="#00d4aa" opacity="0.8"/>

  <!-- Compounding arrows (circular motion) -->
  <path d="M320,175 A165,165 0 0,1 485,335" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <path d="M485,345 A165,165 0 0,1 325,505" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

  <!-- Center icon: infinity/cycle -->
  <text x="320" y="348" text-anchor="middle" fill="#00d4aa" font-size="36" opacity="0.15" font-weight="900">∞</text>

  <!-- RIGHT SIDE: Comparison charts -->
  <!-- Title area -->
  <text x="820" y="120" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800" letter-spacing="1">DATA FLYWHEEL</text>
  <rect x="620" y="132" width="400" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="820" y="168" text-anchor="middle" fill="#a0aec0" font-size="16" font-weight="400">Agentes que aprendem vs. modelos que apenas executam</text>

  <!-- FLYWHEEL line chart (going up) -->
  <text x="660" y="240" fill="#00d4aa" font-size="13" font-weight="700">COM FLYWHEEL</text>
  <polyline points="660,450 720,420 780,380 840,340 900,300 960,270" fill="none" stroke="#00d4aa" stroke-width="3" filter="url(#glow)"/>
  <circle cx="660" cy="450" r="4" fill="#00d4aa"/><circle cx="720" cy="420" r="4" fill="#00d4aa"/>
  <circle cx="780" cy="380" r="4" fill="#00d4aa"/><circle cx="840" cy="340" r="4" fill="#00d4aa"/>
  <circle cx="900" cy="300" r="4" fill="#00d4aa"/><circle cx="960" cy="270" r="4" fill="#00d4aa"/>
  <!-- Shaded area under flywheel -->
  <polygon points="660,450 720,420 780,380 840,340 900,300 960,270 960,460 660,460" fill="#00d4aa" opacity="0.08"/>
  
  <!-- Time labels -->
  <text x="660" y="475" fill="#556" font-size="10">Mês 1</text>
  <text x="780" y="475" fill="#556" font-size="10">Mês 3</text>
  <text x="900" y="475" fill="#556" font-size="10">Mês 5</text>

  <!-- STATIC line chart (declining then flat) -->
  <text x="660" y="505" fill="#ff6b6b" font-size="13" font-weight="700">SEM FLYWHEEL</text>
  <polyline points="660,395 720,410 780,425 840,435 900,440 960,442" fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="8,4"/>
  <circle cx="660" cy="395" r="3.5" fill="#ff6b6b"/><circle cx="720" cy="410" r="3.5" fill="#ff6b6b"/>
  <circle cx="780" cy="425" r="3.5" fill="#ff6b6b"/><circle cx="840" cy="435" r="3.5" fill="#ff6b6b"/>
  <circle cx="900" cy="440" r="3.5" fill="#ff6b6b"/><circle cx="960" cy="442" r="3.5" fill="#ff6b6b"/>

  <!-- STATS box -->
  <rect x="630" y="520" width="370" height="90" rx="10" fill="#0d1230" stroke="#00d4aa" stroke-width="1" opacity="0.9"/>
  <text x="650" y="545" fill="#00d4aa" font-size="12" font-weight="700">NVIDIA NVInfo AI:</text>
  <text x="650" y="565" fill="#a0aec0" font-size="11">8B substituiu 70B com 96% acurácia</text>
  <text x="650" y="582" fill="#a0aec0" font-size="11">10x menor | 70% menos latência</text>
  <text x="650" y="600" fill="#a0aec0" font-size="11">+11.7% recall | +8.4% utilidade (Airbnb AITL)</text>

  <!-- BaXiJen branding -->
  <text x="60" y="42" fill="#00d4aa" font-size="18" font-weight="800" letter-spacing="2">BaXiJen</text>
  <text x="60" y="62" fill="#a0aec0" font-size="11" letter-spacing="1">Antes de tudo, Brasileiro.</text>
  
  <!-- Author tag -->
  <rect x="60" y="580" width="180" height="32" rx="6" fill="#1a1f4e" stroke="#00d4aa" stroke-width="1" opacity="0.8"/>
  <text x="150" y="601" text-anchor="middle" fill="#00d4aa" font-size="11" font-weight="600">Marcus Ramalho · CTO</text>
</svg>