<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="50%" stop-color="#111B3A"/>
      <stop offset="100%" stop-color="#0A0E27"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C2FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2547" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F1830" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accentGrad)"/>

  <!-- BaXiJen logo text -->
  <text x="80" y="75" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" opacity="0.6">
    BaXiJen
  </text>
  <circle cx="175" cy="68" r="4" fill="#00FFA3" opacity="0.8"/>

  <!-- Category tag -->
  <rect x="80" y="110" width="180" height="36" rx="18" fill="none" stroke="#00C2FF" stroke-width="1.5" opacity="0.7"/>
  <text x="170" y="134" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#00C2FF" text-anchor="middle" opacity="0.9">
    VENDAS B2B &amp; IA
  </text>

  <!-- Main title -->
  <text x="80" y="200" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">
    Vendas Consultivas de IA
  </text>
  <text x="80" y="258" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF">
    em 2026
  </text>

  <!-- Subtitle with accent -->
  <rect x="80" y="290" width="6" height="32" fill="url(#accentGrad)" rx="3"/>
  <text x="100" y="315" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#A0B4D8">
    Por que o diagnóstico vende mais que a demo
  </text>

  <!-- Central visual: Comparison cards -->
  <!-- Left card: DEMO (lower performance) -->
  <g transform="translate(80, 370)">
    <rect width="480" height="200" rx="12" fill="url(#cardGrad)" stroke="#FF4757" stroke-width="1" opacity="0.85"/>
    <text x="240" y="40" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#FF4757" text-anchor="middle" opacity="0.9">
      DEMO GENÉRICA
    </text>
    <line x1="40" y1="55" x2="440" y2="55" stroke="#FF4757" stroke-width="0.5" opacity="0.3"/>
    <text x="30" y="85" font-family="Inter, sans-serif" font-size="14" fill="#D0D8E8" opacity="0.8">
      ▸ Volume de contatos: alto</text>
    <text x="30" y="110" font-family="Inter, sans-serif" font-size="14" fill="#D0D8E8" opacity="0.8">
      ▸ Qualificação: superficial</text>
    <text x="30" y="135" font-family="Inter, sans-serif" font-size="14" fill="#D0D8E8" opacity="0.8">
      ▸ Ciclo de vendas: longo</text>
    <text x="30" y="160" font-family="Inter, sans-serif" font-size="14" fill="#D0D8E8" opacity="0.8">
      ▸ Conversão reunião-oportunidade: 15%</text>
    <text x="30" y="185" font-family="Inter, sans-serif" font-size="14" fill="#FF4757" font-weight="600" opacity="0.9">
      ▸ Churn de ferramenta: 50-70% ao ano
    </text>
  </g>

  <!-- Right card: DIAGNÓSTICO (higher performance) -->
  <g transform="translate(640, 370)">
    <rect width="480" height="200" rx="12" fill="url(#cardGrad)" stroke="#00FFA3" stroke-width="1.5" opacity="0.95" filter="url(#glow)"/>
    <text x="240" y="40" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#00FFA3" text-anchor="middle">
      DIAGNÓSTICO CONSULTIVO
    </text>
    <line x1="40" y1="55" x2="440" y2="55" stroke="#00FFA3" stroke-width="0.5" opacity="0.4"/>
    <text x="30" y="85" font-family="Inter, sans-serif" font-size="14" fill="#E0E8F0">
      ▸ Sinais em tempo real por conta</text>
    <text x="30" y="110" font-family="Inter, sans-serif" font-size="14" fill="#E0E8F0">
      ▸ Qualificação profunda com IA + humano</text>
    <text x="30" y="135" font-family="Inter, sans-serif" font-size="14" fill="#E0E8F0">
      ▸ Ciclo 25% mais curto</text>
    <text x="30" y="160" font-family="Inter, sans-serif" font-size="14" fill="#E0E8F0">
      ▸ Conversão: 25% (humano) + IA augmentation</text>
    <text x="30" y="185" font-family="Inter, sans-serif" font-size="14" fill="#00FFA3" font-weight="600">
      ▸ 83% relataram crescimento de receita
    </text>
  </g>

  <!-- Key stat overlay -->
  <g transform="translate(560, 350)">
    <circle cx="40" cy="0" r="30" fill="url(#accentGrad)" opacity="0.15"/>
    <text x="40" y="-2" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#00FFA3" text-anchor="middle">
      +17
    </text>
    <text x="40" y="12" font-family="Inter, sans-serif" font-size="9" fill="#A0B4D8" text-anchor="middle">
      p.p.
    </text>
  </g>

  <!-- Author -->
  <text x="80" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" opacity="0.5">
    Por Luiz Felipe Barbedo  &middot;  Co-Founder BaXiJen
  </text>

  <!-- Date -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#FFFFFF" opacity="0.5" text-anchor="end">
    Julho 2026
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accentGrad)" opacity="0.5"/>
</svg>