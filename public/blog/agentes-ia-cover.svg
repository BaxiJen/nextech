<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="450" r="220" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="1000" cy="180" r="200" fill="#ec4899" opacity="0.08"/>
  <circle cx="600" cy="315" r="280" fill="#8b5cf6" opacity="0.04"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent2)" opacity="0.6"/>
  <!-- BaXiJen logo text -->
  <text x="60" y="80" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.8">BaXiJen</text>
  <!-- Main title -->
  <text x="600" y="270" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">Agentes de IA</text>
  <text x="600" y="340" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">Autônomos</text>
  <!-- Subtitle -->
  <text x="600" y="420" font-family="system-ui, sans-serif" font-size="22" fill="#c4b5fd" text-anchor="middle">O que são e por que sua empresa precisa entender</text>
  <!-- Decorative line -->
  <rect x="540" y="450" width="120" height="3" rx="1.5" fill="url(#accent2)"/>
</svg>