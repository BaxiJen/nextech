<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#1a3a1a"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="480" r="180" fill="#4CAF50" opacity="0.08"/>
  <circle cx="1050" cy="150" r="200" fill="#06b6d4" opacity="0.08"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#4CAF50" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Bottom accent bar -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent3)" opacity="0.6"/>
  <!-- BaXiJen logo text -->
  <text x="60" y="80" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#ffffff" opacity="0.8">BaXiJen</text>
  <!-- SLM badge -->
  <rect x="60" y="100" width="80" height="32" rx="16" fill="#4CAF50" opacity="0.2"/>
  <text x="100" y="122" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4CAF50" text-anchor="middle">SLM</text>
  <!-- Main title -->
  <text x="600" y="280" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">Small Language</text>
  <text x="600" y="350" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle">Models</text>
  <!-- Subtitle -->
  <text x="600" y="430" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">O novo paradigma para agentes de IA</text>
  <!-- Decorative line -->
  <rect x="540" y="460" width="120" height="3" rx="1.5" fill="url(#accent3)"/>
  <!-- Key insight -->
  <text x="600" y="520" font-family="system-ui, sans-serif" font-size="16" fill="#4CAF50" text-anchor="middle" opacity="0.7">NVIDIA Research · ACL 2026 · BaXiJen</text>
</svg>