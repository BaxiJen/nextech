<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#111936"/>
      <stop offset="100%" stop-color="#0d1330"/>
    </linearGradient>
    <linearGradient id="accent-rag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="accent-ft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="glow-rag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-ft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- VS divider -->
  <line x1="600" y1="80" x2="600" y2="560" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" stroke-dasharray="8,8"/>

  <!-- RAG Side (left) -->
  <!-- Glow -->
  <rect x="60" y="160" width="480" height="300" rx="12" fill="url(#glow-rag)" opacity="0.3"/>

  <!-- RAG pipeline box -->
  <rect x="80" y="180" width="440" height="260" rx="10" fill="#0d1330" stroke="#00d4aa" stroke-width="2" filter="url(#shadow)"/>

  <!-- RAG label -->
  <text x="300" y="220" text-anchor="middle" font-size="28" font-weight="800" fill="#00d4aa" filter="url(#neon)">RAG</text>
  <text x="300" y="245" text-anchor="middle" font-size="13" fill="#00d4aa" opacity="0.7">Retrieval-Augmented Generation</text>

  <!-- RAG pipeline diagram -->
  <!-- Query -->
  <rect x="110" y="270" width="100" height="40" rx="6" fill="#111936" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="160" y="295" text-anchor="middle" font-size="12" fill="#00d4aa">Query</text>

  <!-- Arrow -->
  <line x1="210" y1="290" x2="250" y2="290" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <defs><marker id="arrowR" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#00d4aa"/></marker></defs>

  <!-- Vector Store -->
  <rect x="255" y="270" width="100" height="40" rx="6" fill="#111936" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="305" y="290" text-anchor="middle" font-size="11" fill="#00d4aa">Vector</text>
  <text x="305" y="303" text-anchor="middle" font-size="11" fill="#00d4aa">Store</text>

  <!-- Arrow -->
  <line x1="355" y1="290" x2="395" y2="290" stroke="#00d4aa" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- LLM -->
  <rect x="400" y="270" width="100" height="40" rx="6" fill="#111936" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="450" y="295" text-anchor="middle" font-size="12" fill="#00d4aa">LLM</text>

  <!-- RAG features -->
  <g font-size="12" fill="#a0aec0">
    <text x="160" y="340">✓ Dados ao vivo</text>
    <text x="160" y="360">✓ Fontes rastreáveis</text>
    <text x="160" y="380">✓ Custo por query</text>
    <text x="160" y="400">✓ Troca de modelo livre</text>
    <text x="160" y="420">✓ 51% adoção enterprise</text>
  </g>

  <!-- Fine-tuning Side (right) -->
  <!-- Glow -->
  <rect x="660" y="160" width="480" height="300" rx="12" fill="url(#glow-ft)" opacity="0.3"/>

  <!-- FT box -->
  <rect x="680" y="180" width="440" height="260" rx="10" fill="#0d1330" stroke="#ff6b6b" stroke-width="2" filter="url(#shadow)"/>

  <!-- FT label -->
  <text x="900" y="220" text-anchor="middle" font-size="28" font-weight="800" fill="#ff6b6b" filter="url(#neon)">Fine-tuning</text>
  <text x="900" y="245" text-anchor="middle" font-size="13" fill="#ff6b6b" opacity="0.7">Parameter-Efficient (LoRA)</text>

  <!-- FT diagram -->
  <!-- Dataset -->
  <rect x="710" y="270" width="100" height="40" rx="6" fill="#1a1020" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="760" y="290" text-anchor="middle" font-size="11" fill="#ff6b6b">Dataset</text>
  <text x="760" y="303" text-anchor="middle" font-size="11" fill="#ff6b6b">Curado</text>

  <!-- Arrow -->
  <line x1="810" y1="290" x2="850" y2="290" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arrowFT)"/>
  <defs><marker id="arrowFT" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#ff6b6b"/></marker></defs>

  <!-- Training -->
  <rect x="855" y="270" width="100" height="40" rx="6" fill="#1a1020" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="905" y="290" text-anchor="middle" font-size="11" fill="#ff6b6b">Training</text>
  <text x="905" y="303" text-anchor="middle" font-size="11" fill="#ff6b6b">LoRA</text>

  <!-- Arrow -->
  <line x1="955" y1="290" x2="995" y2="290" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arrowFT)"/>

  <!-- Weights -->
  <rect x="1000" y="270" width="100" height="40" rx="6" fill="#1a1020" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="1050" y="290" text-anchor="middle" font-size="11" fill="#ff6b6b">Weights</text>
  <text x="1050" y="303" text-anchor="middle" font-size="11" fill="#ff6b6b">Atualizados</text>

  <!-- FT features -->
  <g font-size="12" fill="#a0aec0">
    <text x="760" y="340">✓ Comportamento customizado</text>
    <text x="760" y="360">✓ Zero latência de retrieval</text>
    <text x="760" y="380">✓ Edge / offline</text>
    <text x="760" y="400">✓ Tom e formato</text>
    <text x="760" y="420">✓ 78% migram p/ RAG em 9m</text>
  </g>

  <!-- VS circle -->
  <circle cx="600" cy="320" r="30" fill="#0d1330" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="326" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">VS</text>

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff" filter="url(#shadow)">RAG vs Fine-tuning</text>
  <text x="600" y="88" text-anchor="middle" font-size="16" fill="#a0aec0">Quando Usar Cada Um em Produção</text>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-rag)"/>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="600" height="4" fill="url(#accent-rag)"/>
  <rect x="600" y="626" width="600" height="4" fill="url(#accent-ft)"/>

  <!-- BaXiJen branding -->
  <text x="1160" y="610" text-anchor="end" font-size="14" font-weight="700" fill="#ffffff" opacity="0.6">BaXiJen</text>
  <text x="1160" y="625" text-anchor="end" font-size="10" fill="#a0aec0" opacity="0.5">Antes de tudo, Brasileiro.</text>

  <!-- Author -->
  <text x="40" y="610" font-size="11" fill="#a0aec0" opacity="0.6">Por Leonardo Camilo</text>
  <text x="40" y="625" font-size="11" fill="#a0aec0" opacity="0.5">CEO / Tech Lead</text>
</svg>