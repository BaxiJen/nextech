<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#0D1F3C"/>
      <stop offset="100%" style="stop-color:#061018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0077B6;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.06">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#00B4D8" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#00B4D8" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#00B4D8" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#00B4D8" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#00B4D8" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00B4D8" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00B4D8" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00B4D8" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00B4D8" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00B4D8" stroke-width="1"/>
  </g>

  <!-- BaXiJen logo top-left -->
  <g transform="translate(60, 50)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#00B4D8">BaXiJen</text>
    <text x="0" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">Antes de tudo, Brasileiro.</text>
  </g>

  <!-- Title -->
  <text x="60" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#F1F5F9">Tool Use e Function Calling</text>
  <text x="60" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#F1F5F9">em Produção</text>
  <text x="60" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#94A3B8">Como ensinar agentes a usar ferramentas de verdade</text>

  <!-- Four layers diagram -->
  <!-- Layer 1: Schema Registry -->
  <g transform="translate(60, 330)">
    <rect width="480" height="65" rx="8" fill="url(#layerGrad)" stroke="#00B4D8" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="65" rx="3" fill="#00B4D8"/>
    <text x="25" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00B4D8">1. SCHEMA REGISTRY</text>
    <text x="25" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">JSON Schema versionado · descrições precisas · enum constraints</text>
    <!-- Mini schema icon -->
    <g transform="translate(440, 20)">
      <rect width="30" height="25" rx="3" fill="none" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="5" y1="8" x2="25" y2="8" stroke="#00B4D8" stroke-width="1"/>
      <line x1="5" y1="13" x2="20" y2="13" stroke="#00B4D8" stroke-width="1"/>
      <line x1="5" y1="18" x2="22" y2="18" stroke="#00B4D8" stroke-width="1"/>
    </g>
  </g>

  <!-- Layer 2: Validation -->
  <g transform="translate(60, 405)">
    <rect width="480" height="65" rx="8" fill="url(#layerGrad)" stroke="#00B4D8" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="65" rx="3" fill="#00B4D8"/>
    <text x="25" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00B4D8">2. VALIDAÇÃO DUPLO</text>
    <text x="25" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">Estrutural (AJV/Pydantic) + Semântica (sanitização, range, permissão)</text>
    <!-- Checkmark icon -->
    <g transform="translate(442, 22)">
      <circle cx="14" cy="14" r="13" fill="none" stroke="#00B4D8" stroke-width="1.5"/>
      <path d="M7 14 L12 19 L21 9" fill="none" stroke="#00B4D8" stroke-width="2"/>
    </g>
  </g>

  <!-- Layer 3: Error Handling -->
  <g transform="translate(620, 330)">
    <rect width="480" height="65" rx="8" fill="url(#layerGrad)" stroke="#00B4D8" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="65" rx="3" fill="#00B4D8"/>
    <text x="25" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00B4D8">3. ERROR HANDLING</text>
    <text x="25" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">tool_result estruturado · is_error · nunca omitir resultado</text>
    <!-- Error icon -->
    <g transform="translate(442, 22)">
      <circle cx="14" cy="14" r="13" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
      <line x1="9" y1="9" x2="19" y2="19" stroke="#F59E0B" stroke-width="2"/>
      <line x1="19" y1="9" x2="9" y2="19" stroke="#F59E0B" stroke-width="2"/>
    </g>
  </g>

  <!-- Layer 4: Loop Prevention -->
  <g transform="translate(620, 405)">
    <rect width="480" height="65" rx="8" fill="url(#layerGrad)" stroke="#00B4D8" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="65" rx="3" fill="#00B4D8"/>
    <text x="25" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#00B4D8">4. LOOP PREVENTION</text>
    <text x="25" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8">max_tool_calls=10 · contador por sessão · TSS monitoring</text>
    <!-- Loop guard icon -->
    <g transform="translate(440, 20)">
      <path d="M15 5 A10 10 0 1 1 5 15" fill="none" stroke="#00B4D8" stroke-width="1.5"/>
      <path d="M15 5 L10 5 M15 5 L15 10" stroke="#00B4D8" stroke-width="1.5" fill="none"/>
      <text x="20" y="22" font-family="system-ui, sans-serif" font-size="8" fill="#00B4D8">10×</text>
    </g>
  </g>

  <!-- Central flow arrows -->
  <!-- LLM <-> Tools cycle -->
  <g transform="translate(580, 500)">
    <!-- LLM box -->
    <rect x="-60" y="0" width="120" height="40" rx="6" fill="#0077B6" opacity="0.3" stroke="#00B4D8" stroke-width="1.5"/>
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#00B4D8">LLM</text>

    <!-- Arrow right -->
    <line x1="60" y1="20" x2="100" y2="20" stroke="#00B4D8" stroke-width="2" filter="url(#glow)"/>
    <polygon points="100,15 110,20 100,25" fill="#00B4D8"/>
    <text x="80" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">tool_use</text>

    <!-- Tools box -->
    <rect x="110" y="0" width="120" height="40" rx="6" fill="#0077B6" opacity="0.3" stroke="#00B4D8" stroke-width="1.5"/>
    <text x="170" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#00B4D8">TOOLS</text>

    <!-- Arrow left (return) -->
    <line x1="110" y1="35" x2="60" y2="35" stroke="#F59E0B" stroke-width="2" filter="url(#glow)"/>
    <polygon points="60,30 50,35 60,40" fill="#F59E0B"/>
    <text x="80" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">tool_result</text>
  </g>

  <!-- Key stats -->
  <g transform="translate(60, 570)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">
      <tspan font-weight="700" fill="#00B4D8">75%</tspan> acurácia no BFCL v4 ·
      <tspan font-weight="700" fill="#00B4D8">87%</tspan> TSS médio ·
      <tspan font-weight="700" fill="#00B4D8">15-25%</tspan> falhas silenciosas sem validação
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>