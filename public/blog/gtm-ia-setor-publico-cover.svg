<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#122044;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3066;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e676;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2979ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#448aff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="40" y1="0" x2="40" y2="630" />
    <line x1="80" y1="0" x2="80" y2="630" /><line x1="120" y1="0" x2="120" y2="630" />
    <line x1="160" y1="0" x2="160" y2="630" /><line x1="200" y1="0" x2="200" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="280" y1="0" x2="280" y2="630" />
    <line x1="320" y1="0" x2="320" y2="630" /><line x1="360" y1="0" x2="360" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" /><line x1="440" y1="0" x2="440" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="520" y1="0" x2="520" y2="630" />
    <line x1="560" y1="0" x2="560" y2="630" /><line x1="600" y1="0" x2="600" y2="630" />
    <line x1="640" y1="0" x2="640" y2="630" /><line x1="680" y1="0" x2="680" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="760" y1="0" x2="760" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" /><line x1="840" y1="0" x2="840" y2="630" />
    <line x1="880" y1="0" x2="880" y2="630" /><line x1="920" y1="0" x2="920" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1000" y1="0" x2="1000" y2="630" />
    <line x1="1040" y1="0" x2="1040" y2="630" /><line x1="1080" y1="0" x2="1080" y2="630" />
    <line x1="1120" y1="0" x2="1120" y2="630" /><line x1="1160" y1="0" x2="1160" y2="630" />
    <line x1="0" y1="40" x2="1200" y2="40" /><line x1="0" y1="80" x2="1200" y2="80" />
    <line x1="0" y1="120" x2="1200" y2="120" /><line x1="0" y1="160" x2="1200" y2="160" />
    <line x1="0" y1="200" x2="1200" y2="200" /><line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="280" x2="1200" y2="280" /><line x1="0" y1="320" x2="1200" y2="320" />
    <line x1="0" y1="360" x2="1200" y2="360" /><line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="440" x2="1200" y2="440" /><line x1="0" y1="480" x2="1200" y2="480" />
    <line x1="0" y1="520" x2="1200" y2="520" /><line x1="0" y1="560" x2="1200" y2="560" />
    <line x1="0" y1="600" x2="1200" y2="600" />
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="120" r="180" fill="#00c853" opacity="0.04" filter="url(#softGlow)"/>
  <circle cx="1050" cy="450" r="120" fill="#2979ff" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Left side: Government building icon -->
  <g transform="translate(70, 140)">
    <!-- Building -->
    <rect x="20" y="80" width="160" height="200" rx="4" fill="none" stroke="#448aff" stroke-width="2" opacity="0.7"/>
    <rect x="40" y="100" width="30" height="40" rx="2" fill="#2979ff" opacity="0.3"/>
    <rect x="85" y="100" width="30" height="40" rx="2" fill="#2979ff" opacity="0.3"/>
    <rect x="130" y="100" width="30" height="40" rx="2" fill="#2979ff" opacity="0.3"/>
    <rect x="40" y="160" width="30" height="40" rx="2" fill="#2979ff" opacity="0.2"/>
    <rect x="85" y="160" width="30" height="40" rx="2" fill="#2979ff" opacity="0.2"/>
    <rect x="130" y="160" width="30" height="40" rx="2" fill="#2979ff" opacity="0.2"/>
    <rect x="40" y="220" width="30" height="40" rx="2" fill="#2979ff" opacity="0.15"/>
    <rect x="85" y="220" width="30" height="40" rx="2" fill="#00c853" opacity="0.3"/>
    <rect x="130" y="220" width="30" height="40" rx="2" fill="#2979ff" opacity="0.15"/>
    <!-- Pediment -->
    <polygon points="0,80 100,20 200,80" fill="none" stroke="#448aff" stroke-width="2" opacity="0.7"/>
    <!-- Columns -->
    <rect x="20" y="80" width="8" height="200" fill="#448aff" opacity="0.4"/>
    <rect x="96" y="80" width="8" height="200" fill="#448aff" opacity="0.4"/>
    <rect x="172" y="80" width="8" height="200" fill="#448aff" opacity="0.4"/>

    <!-- Network nodes -->
    <circle cx="100" cy="-20" r="12" fill="#00c853" opacity="0.8" filter="url(#glow)"/>
    <circle cx="30" cy="-40" r="8" fill="#2979ff" opacity="0.6"/>
    <circle cx="170" cy="-40" r="8" fill="#2979ff" opacity="0.6"/>
    <circle cx="100" cy="-70" r="6" fill="#00e676" opacity="0.5"/>
    <circle cx="-20" cy="-10" r="6" fill="#00e676" opacity="0.4"/>
    <circle cx="220" cy="-10" r="6" fill="#00e676" opacity="0.4"/>
    <!-- Network lines -->
    <line x1="100" y1="-20" x2="30" y2="-40" stroke="#00c853" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="-20" x2="170" y2="-40" stroke="#00c853" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="-20" x2="100" y2="-70" stroke="#00c853" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="-20" x2="-20" y2="-10" stroke="#2979ff" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="-20" x2="220" y2="-10" stroke="#2979ff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Arrow connecting government to AI -->
  <g transform="translate(300, 280)">
    <path d="M0,40 C40,40 60,40 100,40" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
    <polygon points="100,33 115,40 100,47" fill="#00c853" opacity="0.8"/>
  </g>

  <!-- Right side: AI Brain icon -->
  <g transform="translate(820, 100)">
    <!-- Brain outline -->
    <path d="M60,20 C30,20 10,50 10,80 C10,100 20,120 40,140 C50,150 55,160 55,170 C55,175 60,180 70,180 C80,180 85,175 85,170 C85,160 90,150 100,140 C120,120 130,100 130,80 C130,50 110,20 80,20 C75,10 65,10 60,20 Z" fill="none" stroke="#00c853" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>
    <!-- Brain circuits -->
    <path d="M70,50 L70,80 M50,65 L90,65 M55,90 L85,90" stroke="#00e676" stroke-width="1.5" opacity="0.6"/>
    <circle cx="70" cy="50" r="4" fill="#00c853" opacity="0.8"/>
    <circle cx="50" cy="65" r="4" fill="#2979ff" opacity="0.8"/>
    <circle cx="90" cy="65" r="4" fill="#2979ff" opacity="0.8"/>
    <circle cx="55" cy="90" r="4" fill="#00e676" opacity="0.7"/>
    <circle cx="85" cy="90" r="4" fill="#00e676" opacity="0.7"/>
    <circle cx="70" cy="80" r="5" fill="#00c853" opacity="0.9" filter="url(#glow)"/>
    <!-- Data flowing out -->
    <circle cx="140" cy="80" r="4" fill="#448aff" opacity="0.5"/>
    <circle cx="160" cy="60" r="3" fill="#448aff" opacity="0.4"/>
    <circle cx="155" cy="100" r="3" fill="#448aff" opacity="0.4"/>
    <line x1="130" y1="80" x2="140" y2="80" stroke="#448aff" stroke-width="1" opacity="0.4"/>
    <line x1="140" y1="80" x2="160" y2="60" stroke="#448aff" stroke-width="1" opacity="0.3"/>
    <line x1="140" y1="80" x2="155" y2="100" stroke="#448aff" stroke-width="1" opacity="0.3"/>

    <!-- Shield icon (soberania) -->
    <g transform="translate(40, 200)">
      <path d="M25,0 L50,15 L50,40 C50,60 25,75 25,75 C25,75 0,60 0,40 L0,15 Z" fill="none" stroke="#00c853" stroke-width="2" opacity="0.7"/>
      <path d="M25,15 L25,45 M15,30 L35,30" stroke="#00c853" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- Document icon (licitação) -->
    <g transform="translate(100, 200)">
      <rect x="0" y="0" width="35" height="45" rx="3" fill="none" stroke="#2979ff" stroke-width="2" opacity="0.7"/>
      <line x1="8" y1="12" x2="27" y2="12" stroke="#2979ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="8" y1="22" x2="27" y2="22" stroke="#2979ff" stroke-width="1.5" opacity="0.5"/>
      <line x1="8" y1="32" x2="20" y2="32" stroke="#2979ff" stroke-width="1.5" opacity="0.5"/>
      <text x="17" y="8" font-size="7" fill="#448aff" opacity="0.6" text-anchor="middle">14.133</text>
    </g>
  </g>

  <!-- Title area -->
  <g transform="translate(340, 80)">
    <text x="0" y="0" font-size="14" fill="#00c853" font-weight="600" letter-spacing="3" opacity="0.9">B2G STRATEGY</text>
    <text x="0" y="55" font-size="42" fill="#ffffff" font-weight="800" letter-spacing="-1">Go-to-Market de IA</text>
    <text x="0" y="105" font-size="42" fill="#ffffff" font-weight="800" letter-spacing="-1">no Setor Público</text>

    <!-- Accent line -->
    <rect x="0" y="125" width="80" height="4" rx="2" fill="url(#accentGrad)"/>

    <text x="0" y="165" font-size="18" fill="#a0b4cc" font-weight="400">PBIA, Lei 14.133 e as estratégias que</text>
    <text x="0" y="192" font-size="18" fill="#a0b4cc" font-weight="400">startups brasileiras precisam dominar</text>
  </g>

  <!-- Stats bar at bottom -->
  <g transform="translate(0, 480)">
    <rect x="0" y="0" width="1200" height="150" fill="#0a1628" opacity="0.6"/>

    <!-- Stat 1 -->
    <g transform="translate(60, 20)">
      <text x="0" y="30" font-size="32" fill="#00c853" font-weight="800" filter="url(#glow)">R$ 23Bi</text>
      <text x="0" y="55" font-size="13" fill="#8899aa" font-weight="400">Investimento PBIA</text>
      <text x="0" y="72" font-size="11" fill="#667788">2024-2028</text>
    </g>

    <!-- Divider -->
    <line x1="260" y1="15" x2="260" y2="80" stroke="#2a3a55" stroke-width="1"/>

    <!-- Stat 2 -->
    <g transform="translate(300, 20)">
      <text x="0" y="30" font-size="32" fill="#00c853" font-weight="800" filter="url(#glow)">16,6%</text>
      <text x="0" y="55" font-size="13" fill="#8899aa" font-weight="400">CAGR IA Governamental</text>
      <text x="0" y="72" font-size="11" fill="#667788">América Latina</text>
    </g>

    <!-- Divider -->
    <line x1="520" y1="15" x2="520" y2="80" stroke="#2a3a55" stroke-width="1"/>

    <!-- Stat 3 -->
    <g transform="translate(560, 20)">
      <text x="0" y="30" font-size="32" fill="#448aff" font-weight="800">89%</text>
      <text x="0" y="55" font-size="13" fill="#8899aa" font-weight="400">Servidores veem IA</text>
      <text x="0" y="72" font-size="11" fill="#667788">como essencial</text>
    </g>

    <!-- Divider -->
    <line x1="740" y1="15" x2="740" y2="80" stroke="#2a3a55" stroke-width="1"/>

    <!-- Stat 4 -->
    <g transform="translate(780, 20)">
      <text x="0" y="30" font-size="32" fill="#448aff" font-weight="800">54</text>
      <text x="0" y="55" font-size="13" fill="#8899aa" font-weight="400">Ações estruturantes</text>
      <text x="0" y="72" font-size="11" fill="#667788">no PBIA</text>
    </g>

    <!-- Divider -->
    <line x1="950" y1="15" x2="950" y2="80" stroke="#2a3a55" stroke-width="1"/>

    <!-- Stat 5 -->
    <g transform="translate(990, 20)">
      <text x="0" y="30" font-size="32" fill="#00e676" font-weight="800">1Mi+</text>
      <text x="0" y="55" font-size="13" fill="#8899aa" font-weight="400">Compras públicas em 2025</text>
      <text x="0" y="72" font-size="11" fill="#667788">via PNCP</text>
    </g>
  </g>

  <!-- BaXiJen logo area -->
  <g transform="translate(340, 440)">
    <text x="0" y="0" font-size="14" fill="#ffffff" font-weight="700" letter-spacing="2" opacity="0.6">BAXIJEN</text>
    <text x="105" y="0" font-size="14" fill="#00c853" font-weight="400" letter-spacing="1" opacity="0.6">|  Luiz Felipe Barbedo</text>
  </g>
</svg>