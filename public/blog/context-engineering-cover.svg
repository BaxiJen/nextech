<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2332"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00D4AA" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="200" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.1"/>
  <circle cx="950" cy="100" r="150" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.08"/>
  <circle cx="950" cy="100" r="100" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.05"/>

  <!-- Left side: Title area -->
  <text x="60" y="80" fill="#00D4AA" font-size="13" font-weight="600" letter-spacing="3">BAXIJEN BLOG</text>
  <text x="60" y="140" fill="#F0F6FC" font-size="42" font-weight="800" letter-spacing="-1">Context</text>
  <text x="60" y="190" fill="#F0F6FC" font-size="42" font-weight="800" letter-spacing="-1">Engineering</text>
  <line x1="60" y1="210" x2="400" y2="210" stroke="url(#accent)" stroke-width="3"/>
  <text x="60" y="245" fill="#8B949E" font-size="16" font-weight="400">O novo prompt engineering</text>
  <text x="60" y="270" fill="#8B949E" font-size="16" font-weight="400">para agentes de produção</text>

  <!-- Author -->
  <text x="60" y="310" fill="#00D4AA" font-size="13" font-weight="500">Leonardo Camilo</text>
  <text x="60" y="330" fill="#6E7681" font-size="12">CEO e Co-fundador na BaXiJen</text>

  <!-- Right side: Context Window diagram -->
  <!-- Prompt Engineering box (old) -->
  <rect x="680" y="50" width="220" height="80" rx="8" fill="url(#card1)" stroke="#30363D" stroke-width="1"/>
  <text x="700" y="78" fill="#8B949E" font-size="11" font-weight="600" letter-spacing="1">PROMPT ENGINEERING</text>
  <rect x="700" y="92" width="180" height="24" rx="4" fill="#1E3A5F" opacity="0.5"/>
  <text x="710" y="108" fill="#0EA5E9" font-size="11">→ instrução única</text>

  <!-- Arrow down -->
  <path d="M 790 130 L 790 155" stroke="url(#accent)" stroke-width="2"/>
  <polygon points="783,155 797,155 790,165" fill="#00D4AA"/>

  <!-- Context Engineering box (new, bigger) -->
  <rect x="620" y="170" width="340" height="240" rx="10" fill="url(#card1)" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="645" y="198" fill="#00D4AA" font-size="11" font-weight="700" letter-spacing="1">CONTEXT ENGINEERING</text>

  <!-- Context components inside -->
  <!-- Instructions -->
  <rect x="645" y="210" width="145" height="36" rx="4" fill="#0D2818" stroke="#00D4AA" stroke-width="0.8" opacity="0.9"/>
  <text x="655" y="228" fill="#00D4AA" font-size="10" font-weight="600">instruções</text>
  <text x="655" y="240" fill="#6E7681" font-size="9">system prompt</text>

  <!-- Tools -->
  <rect x="800" y="210" width="145" height="36" rx="4" fill="#1A1A35" stroke="#818CF8" stroke-width="0.8" opacity="0.9"/>
  <text x="810" y="228" fill="#818CF8" font-size="10" font-weight="600">ferramentas</text>
  <text x="810" y="240" fill="#6E7681" font-size="9">tool descriptions</text>

  <!-- Memory -->
  <rect x="645" y="256" width="145" height="36" rx="4" fill="#1A2710" stroke="#A3E635" stroke-width="0.8" opacity="0.9"/>
  <text x="655" y="274" fill="#A3E635" font-size="10" font-weight="600">memória</text>
  <text x="655" y="286" fill="#6E7681" font-size="9">long-term store</text>

  <!-- RAG / External data -->
  <rect x="800" y="256" width="145" height="36" rx="4" fill="#2A1A10" stroke="#F59E0B" stroke-width="0.8" opacity="0.9"/>
  <text x="810" y="274" fill="#F59E0B" font-size="10" font-weight="600">dados externos</text>
  <text x="810" y="286" fill="#6E7681" font-size="9">RAG, APIs</text>

  <!-- History -->
  <rect x="645" y="302" width="300" height="36" rx="4" fill="#1A1027" stroke="#C084FC" stroke-width="0.8" opacity="0.9"/>
  <text x="655" y="320" fill="#C084FC" font-size="10" font-weight="600">histórico de conversa + tool results</text>
  <text x="655" y="332" fill="#6E7681" font-size="9">message history, scratchpad, tool feedback</text>

  <!-- MCP badge -->
  <rect x="645" y="348" width="300" height="28" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="0.5"/>
  <text x="660" y="366" fill="#6E7681" font-size="10">Model Context Protocol (MCP)</text>
  <circle cx="935" cy="362" r="4" fill="#00D4AA"/>

  <!-- Four failure modes at bottom -->
  <text x="60" y="410" fill="#EF4444" font-size="12" font-weight="700" letter-spacing="1">4 MODOS DE FALHA</text>

  <rect x="60" y="425" width="250" height="44" rx="6" fill="#1A1015" stroke="#EF4444" stroke-width="0.8" opacity="0.8"/>
  <text x="75" y="445" fill="#EF4444" font-size="11" font-weight="700">Context Poisoning</text>
  <text x="75" y="460" fill="#6E7681" font-size="10">alucinação contamina turnos futuros</text>

  <rect x="325" y="425" width="250" height="44" rx="6" fill="#1A1A10" stroke="#F59E0B" stroke-width="0.8" opacity="0.8"/>
  <text x="340" y="445" fill="#F59E0B" font-size="11" font-weight="700">Context Distraction</text>
  <text x="340" y="460" fill="#6E7681" font-size="10">contexto sobrecarrega o modelo</text>

  <rect x="590" y="425" width="250" height="44" rx="6" fill="#1A1515" stroke="#FB923C" stroke-width="0.8" opacity="0.8"/>
  <text x="605" y="445" fill="#FB923C" font-size="11" font-weight="700">Context Confusion</text>
  <text x="605" y="460" fill="#6E7681" font-size="10">info irrelevante influencia resposta</text>

  <rect x="855" y="425" width="280" height="44" rx="6" fill="#1A1020" stroke="#E879F9" stroke-width="0.8" opacity="0.8"/>
  <text x="870" y="445" fill="#E879F9" font-size="11" font-weight="700">Context Clash</text>
  <text x="870" y="460" fill="#6E7681" font-size="10">fontes de contexto divergem</text>

  <!-- Four strategies -->
  <text x="60" y="510" fill="#00D4AA" font-size="12" font-weight="700" letter-spacing="1">4 ESTRATÉGIAS</text>

  <rect x="60" y="525" width="250" height="44" rx="6" fill="#0D2818" stroke="#00D4AA" stroke-width="0.8"/>
  <text x="75" y="545" fill="#00D4AA" font-size="11" font-weight="700">Write</text>
  <text x="75" y="560" fill="#6E7681" font-size="10">salvar contexto fora da janela</text>

  <rect x="325" y="525" width="250" height="44" rx="6" fill="#0D1828" stroke="#0EA5E9" stroke-width="0.8"/>
  <text x="340" y="545" fill="#0EA5E9" font-size="11" font-weight="700">Select</text>
  <text x="340" y="560" fill="#6E7681" font-size="10">puxar contexto certo na hora certa</text>

  <rect x="590" y="525" width="250" height="44" rx="6" fill="#0D1A10" stroke="#A3E635" stroke-width="0.8"/>
  <text x="605" y="545" fill="#A3E635" font-size="11" font-weight="700">Compress</text>
  <text x="605" y="560" fill="#6E7681" font-size="10">reduzir sem perder sinal</text>

  <rect x="855" y="525" width="280" height="44" rx="6" fill="#1A0D28" stroke="#C084FC" stroke-width="0.8"/>
  <text x="870" y="545" fill="#C084FC" font-size="11" font-weight="700">Isolate</text>
  <text x="870" y="560" fill="#6E7681" font-size="10">separar contexto entre sub-tarefas</text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#0D1117"/>
  <text x="60" y="620" fill="#6E7681" font-size="11">baxijen.com.br/blog</text>
  <text x="1140" y="620" fill="#00D4AA" font-size="11" text-anchor="end">Antes de tudo, Brasileiro. 🇧🇷</text>
</svg>