<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FACC15" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F87171" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="barGrad5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FCA5A5" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.5">
    <line x1="120" y1="80" x2="120" y2="500"/>
    <line x1="120" y1="500" x2="1080" y2="500"/>
    <line x1="120" y1="170" x2="1080" y2="170" stroke-dasharray="2,4"/>
    <line x1="120" y1="260" x2="1080" y2="260" stroke-dasharray="2,4"/>
    <line x1="120" y1="350" x2="1080" y2="350" stroke-dasharray="2,4"/>
    <line x1="120" y1="440" x2="1080" y2="440" stroke-dasharray="2,4"/>
  </g>

  <!-- Y-axis labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94A3B8" text-anchor="end">
    <text x="110" y="505">0%</text>
    <text x="110" y="175">100%</text>
    <text x="110" y="265">75%</text>
    <text x="110" y="355">50%</text>
    <text x="110" y="445">25%</text>
  </g>

  <!-- 80% threshold line -->
  <line x1="120" y1="212" x2="1080" y2="212" stroke="#22C55E" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="1090" y="216" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#22C55E" font-weight="600">80% confiável</text>

  <!-- Title -->
  <text x="600" y="45" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="700" fill="#F8FAFC" text-anchor="middle">Precisão de Long-Context por Profundidade</text>
  <text x="600" y="70" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">RULER benchmark - Multi-fact retrieval (julho 2026)</text>

  <!-- X-axis labels (context depths) -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#CBD5E1" text-anchor="middle" font-weight="500">
    <text x="220" y="525">4K</text>
    <text x="360" y="525">32K</text>
    <text x="500" y="525">128K</text>
    <text x="640" y="525">200K</text>
    <text x="780" y="525">500K</text>
    <text x="920" y="525">1M</text>
  </g>
  <text x="600" y="555" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Profundidade de contexto (tokens)</text>

  <!-- Bars: Single-needle retrieval (lighter, higher) -->
  <g>
    <!-- 4K: 98% -->
    <rect x="180" y="171" width="50" height="329" fill="url(#barGrad1)" rx="3"/>
    <text x="205" y="165" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4ADE80" text-anchor="middle" font-weight="600">98%</text>

    <!-- 32K: 95% -->
    <rect x="320" y="177" width="50" height="323" fill="url(#barGrad1)" rx="3"/>
    <text x="345" y="171" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4ADE80" text-anchor="middle" font-weight="600">95%</text>

    <!-- 128K: 91% -->
    <rect x="460" y="186" width="50" height="314" fill="url(#barGrad1)" rx="3"/>
    <text x="485" y="180" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4ADE80" text-anchor="middle" font-weight="600">91%</text>

    <!-- 200K: 88% -->
    <rect x="600" y="194" width="50" height="306" fill="url(#barGrad2)" rx="3"/>
    <text x="625" y="188" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FACC15" text-anchor="middle" font-weight="600">88%</text>

    <!-- 500K: 78% -->
    <rect x="740" y="223" width="50" height="277" fill="url(#barGrad3)" rx="3"/>
    <text x="765" y="217" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FB923C" text-anchor="middle" font-weight="600">78%</text>

    <!-- 1M: 68% -->
    <rect x="880" y="255" width="50" height="245" fill="url(#barGrad4)" rx="3"/>
    <text x="905" y="249" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#F87171" text-anchor="middle" font-weight="600">68%</text>
  </g>

  <!-- Bars: Multi-fact retrieval (shorter, lower, offset right) -->
  <g>
    <!-- 4K: 95% -->
    <rect x="235" y="177" width="50" height="323" fill="url(#barGrad1)" rx="3" opacity="0.75"/>
    <text x="260" y="171" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4ADE80" text-anchor="middle" font-weight="600">95%</text>

    <!-- 32K: 87% -->
    <rect x="375" y="202" width="50" height="298" fill="url(#barGrad2)" rx="3" opacity="0.75"/>
    <text x="400" y="196" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FACC15" text-anchor="middle" font-weight="600">87%</text>

    <!-- 128K: 72% -->
    <rect x="515" y="244" width="50" height="256" fill="url(#barGrad3)" rx="3" opacity="0.75"/>
    <text x="540" y="238" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FB923C" text-anchor="middle" font-weight="600">72%</text>

    <!-- 200K: 55% -->
    <rect x="655" y="299" width="50" height="201" fill="url(#barGrad4)" rx="3" opacity="0.75"/>
    <text x="680" y="293" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#F87171" text-anchor="middle" font-weight="600">55%</text>

    <!-- 500K: 35% -->
    <rect x="795" y="361" width="50" height="139" fill="url(#barGrad5)" rx="3" opacity="0.75"/>
    <text x="820" y="355" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FCA5A5" text-anchor="middle" font-weight="600">35%</text>

    <!-- 1M: 20% -->
    <rect x="935" y="411" width="50" height="89" fill="url(#barGrad5)" rx="3" opacity="0.75"/>
    <text x="960" y="405" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FCA5A5" text-anchor="middle" font-weight="600">20%</text>
  </g>

  <!-- Legend -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#CBD5E1">
    <rect x="260" y="575" width="16" height="16" fill="url(#barGrad1)" rx="2"/>
    <text x="285" y="588">Single-needle</text>
    <rect x="400" y="575" width="16" height="16" fill="url(#barGrad1)" rx="2" opacity="0.75"/>
    <text x="425" y="588">Multi-fact</text>
  </g>

  <!-- BaXiJen branding -->
  <rect x="970" y="570" width="120" height="30" rx="15" fill="url(#accentGrad)" opacity="0.2"/>
  <text x="1030" y="590" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#8B5CF6" text-anchor="middle" font-weight="700">BaXiJen</text>

  <!-- Annotation: the gap -->
  <g>
    <path d="M 765 230 Q 800 200, 835 180" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="850" y="178" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#F87171" font-weight="600">-60pp gap</text>
  </g>
</svg>