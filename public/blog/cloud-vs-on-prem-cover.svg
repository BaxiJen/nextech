<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#121e36"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="onpremGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Accent line -->
  <rect x="80" y="85" width="1040" height="3" rx="1.5" fill="url(#accentLine)" opacity="0.8"/>
  
  <!-- Brand -->
  <text x="100" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f0f4f8" letter-spacing="3">BaXiJen</text>
  <text x="245" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" letter-spacing="1">BLOG</text>
  
  <!-- Title -->
  <text x="100" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#ffffff">
    Cloud vs On-Prem para IA
  </text>
  <text x="100" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8">
    Quando cada um faz sentido
  </text>
  
  <!-- Subtitle stat -->
  <text x="100" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#f59e0b" font-weight="600">
    93% das empresas estão repatriando workloads de IA ou avaliando
  </text>
  
  <!-- LEFT: Cloud section -->
  <rect x="80" y="290" width="480" height="280" rx="16" fill="#111c30" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
  
  <!-- Cloud icon -->
  <circle cx="160" cy="340" r="22" fill="url(#cloudGrad)" opacity="0.2"/>
  <text x="160" y="347" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" fill="url(#cloudGrad)">☁</text>
  <text x="195" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#60a5fa">CLOUD</text>
  
  <!-- Cloud items -->
  <circle cx="110" cy="390" r="4" fill="#3b82f6"/>
  <text x="125" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Volume baixo/imprevisível</text>
  
  <circle cx="110" cy="420" r="4" fill="#3b82f6"/>
  <text x="125" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Acesso a modelos frontier</text>
  
  <circle cx="110" cy="450" r="4" fill="#3b82f6"/>
  <text x="125" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Time-to-production rápido</text>
  
  <circle cx="110" cy="480" r="4" fill="#3b82f6"/>
  <text x="125" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Pay-per-token, zero CapEx</text>
  
  <!-- Cloud stat -->
  <text x="320" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Custo linear com volume</text>
  <text x="320" y="558" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" text-anchor="middle">Impossível frontier closed-source on-prem</text>
  
  <!-- VS divider -->
  <line x1="570" y1="310" x2="570" y2="550" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="548" y="395" width="44" height="44" rx="22" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="570" y="423" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle">VS</text>
  
  <!-- RIGHT: On-Prem section -->
  <rect x="600" y="290" width="520" height="280" rx="16" fill="#111c30" stroke="#10b981" stroke-width="1" opacity="0.9"/>
  
  <!-- Server icon -->
  <circle cx="680" cy="340" r="22" fill="url(#onpremGrad)" opacity="0.2"/>
  <text x="680" y="347" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" fill="url(#onpremGrad)">▮</text>
  <text x="715" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#34d399">ON-PREM</text>
  
  <!-- On-prem items -->
  <circle cx="630" cy="390" r="4" fill="#10b981"/>
  <text x="645" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Soberania de dados (LGPD)</text>
  
  <circle cx="630" cy="420" r="4" fill="#10b981"/>
  <text x="645" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Custo marginal próximo a zero</text>
  
  <circle cx="630" cy="450" r="4" fill="#10b981"/>
  <text x="645" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Latência sub-200ms</text>
  
  <circle cx="630" cy="480" r="4" fill="#10b981"/>
  <text x="645" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">Controle total de auditoria</text>
  
  <!-- On-prem stat -->
  <text x="860" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Breakeven em semanas vs frontier</text>
  <text x="860" y="558" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" text-anchor="middle">75% precisam de on-prem para latência</text>
  
  <!-- Bottom accent line -->
  <rect x="80" y="590" width="1040" height="2" rx="1" fill="url(#accentLine)" opacity="0.4"/>
  
  <!-- Footer -->
  <text x="100" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">Por Marcus Ramalho · CTO, BaXiJen · 26/05/2026</text>
  <text x="1100" y="615" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" text-anchor="end">Antes de tudo, Brasileiro. 🇧🇷</text>
</svg>