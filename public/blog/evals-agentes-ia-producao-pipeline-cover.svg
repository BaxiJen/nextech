<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#3b82f6" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- BaXiJen logo area -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="url(#accent)" filter="url(#glow)"/>
    <text x="22" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">BX</text>
    <text x="56" y="29" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">BaXiJen</text>
  </g>

  <!-- Title -->
  <text x="60" y="110" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">
    Evals de Agentes IA em Produção
  </text>
  <text x="60" y="148" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#64748b">
    Como construir um pipeline de avaliação que protege o deploy
  </text>

  <!-- pass^k vs pass@k comparison bar -->
  <g transform="translate(60, 185)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">pass@3 (melhor caso): 97,3%</text>
    <rect x="0" y="10" width="540" height="22" rx="4" fill="#1e293b"/>
    <rect x="0" y="10" width="525" height="22" rx="4" fill="url(#accent)" opacity="0.9"/>
    <text x="550" y="26" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">97,3%</text>

    <text x="0" y="55" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">pass^3 (consistência): 34,3%</text>
    <rect x="0" y="65" width="540" height="22" rx="4" fill="#1e293b"/>
    <rect x="0" y="65" width="185" height="22" rx="4" fill="url(#accent2)" opacity="0.9"/>
    <text x="195" y="81" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">34,3%</text>

    <text x="0" y="115" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Gap de 63 pp para um agente de 70% por tentativa</text>
  </g>

  <!-- Pipeline flow diagram -->
  <g transform="translate(680, 175)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#f8fafc">Pipeline de Evals</text>

    <!-- Step 1: Golden Dataset -->
    <rect x="0" y="15" width="200" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="100" y="33" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Golden Dataset</text>
    <text x="100" y="48" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">20-50 falhas reais</text>

    <!-- Arrow -->
    <line x1="100" y1="58" x2="100" y2="72" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- Step 2: Graders -->
    <rect x="0" y="78" width="200" height="40" rx="6" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="100" y="96" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#06b6d4" text-anchor="middle">Graders</text>
    <text x="100" y="111" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">code-based + model-based</text>

    <!-- Arrow -->
    <line x1="100" y1="121" x2="100" y2="135" stroke="#475569" stroke-width="1.5"/>

    <!-- Step 3: CI/CD Gates -->
    <rect x="0" y="141" width="200" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="100" y="159" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">CI/CD Gates</text>
    <text x="100" y="174" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">5 gates de avaliação</text>

    <!-- Arrow -->
    <line x1="100" y1="184" x2="100" y2="198" stroke="#475569" stroke-width="1.5"/>

    <!-- Step 4: Production -->
    <rect x="0" y="204" width="200" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="100" y="222" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10b981" text-anchor="middle">Produção</text>
    <text x="100" y="237" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">canary + rollback</text>

    <!-- Feedback loop arrow -->
    <path d="M 200 224 Q 260 224 260 35 Q 260 22 240 22 L 200 22" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowgreen)"/>
    <text x="270" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" transform="rotate(90, 270, 130)">feedback loop</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrowgreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Key stats row -->
  <g transform="translate(60, 470)">
    <rect x="0" y="0" width="340" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#3b82f6">24%</text>
    <text x="20" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">melhor agente no APEX-Agents</text>
    <text x="20" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">(1ª tentativa, Mercor 2026)</text>

    <rect x="360" y="0" width="340" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="380" y="28" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#ef4444">60-72%</text>
    <text x="380" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">dos pilotos nunca chegam</text>
    <text x="380" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">à produção (BCG, 2026)</text>

    <rect x="720" y="0" width="340" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="740" y="28" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#f59e0b">0.6</text>
    <text x="740" y="50" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Cohen's kappa mínimo</text>
    <text x="740" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">para LLM-as-judge confiável</text>
  </g>

  <!-- Author -->
  <text x="60" y="590" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">
    Marcus Ramalho · CTO &amp; Co-founder · BaXiJen
  </text>
  <text x="60" y="610" font-family="system-ui, sans-serif" font-size="11" fill="#475569">
    Antes de tudo, Brasileiro. 🇧🇷
  </text>
</svg>