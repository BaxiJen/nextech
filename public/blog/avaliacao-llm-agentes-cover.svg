<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a3ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00c896" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Central pipeline diagram -->
  <!-- Golden Dataset box -->
  <rect x="140" y="175" width="180" height="80" rx="10" fill="none" stroke="#00c896" stroke-width="2" filter="url(#glow)"/>
  <rect x="140" y="175" width="180" height="80" rx="10" fill="#00c896" fill-opacity="0.12"/>
  <text x="230" y="205" text-anchor="middle" fill="#00c896" font-family="system-ui, sans-serif" font-size="13" font-weight="600">GOLDEN</text>
  <text x="230" y="222" text-anchor="middle" fill="#00c896" font-family="system-ui, sans-serif" font-size="13" font-weight="600">DATASET</text>
  <text x="230" y="243" text-anchor="middle" fill="#8ab4c8" font-family="system-ui, sans-serif" font-size="10">200-500 exemplos</text>

  <!-- Arrow 1 -->
  <line x1="320" y1="215" x2="380" y2="215" stroke="#00c896" stroke-width="2" marker-end="url(#arrowHead)"/>
  <polygon points="380,210 390,215 380,220" fill="#00c896"/>

  <!-- Offline Eval box -->
  <rect x="390" y="155" width="180" height="120" rx="10" fill="none" stroke="#00a3ff" stroke-width="2" filter="url(#glow)"/>
  <rect x="390" y="155" width="180" height="120" rx="10" fill="#00a3ff" fill-opacity="0.12"/>
  <text x="480" y="185" text-anchor="middle" fill="#00a3ff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">AVALIAÇÃO</text>
  <text x="480" y="202" text-anchor="middle" fill="#00a3ff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">OFFLINE</text>
  <line x1="410" y1="215" x2="550" y2="215" stroke="#00a3ff" stroke-width="0.5" opacity="0.4"/>
  <text x="480" y="235" text-anchor="middle" fill="#8ab4c8" font-family="system-ui, sans-serif" font-size="9">RAGAS</text>
  <text x="480" y="248" text-anchor="middle" fill="#8ab4c8" font-family="system-ui, sans-serif" font-size="9">Recall@K · MRR</text>
  <text x="480" y="261" text-anchor="middle" fill="#8ab4c8" font-family="system-ui, sans-serif" font-size="9">LLM-as-Judge</text>

  <!-- Arrow 2 -->
  <line x1="570" y1="215" x2="630" y2="215" stroke="#00c896" stroke-width="2"/>
  <polygon points="630,210 640,215 630,220" fill="#00c896"/>

  <!-- Online Monitor box -->
  <rect x="640" y="155" width="180" height="120" rx="10" fill="none" stroke="#ff6b35" stroke-width="2" filter="url(#glow)"/>
  <rect x="640" y="155" width="180" height="120" rx="10" fill="#ff6b35" fill-opacity="0.12"/>
  <text x="730" y="185" text-anchor="middle" fill="#ff6b35" font-family="system-ui, sans-serif" font-size="13" font-weight="600">MONITOR</text>
  <text x="730" y="202" text-anchor="middle" fill="#ff6b35" font-family="system-ui, sans-serif" font-size="13" font-weight="600">ONLINE</text>
  <line x1="660" y1="215" x2="800" y2="215" stroke="#ff6b35" stroke-width="0.5" opacity="0.4"/>
  <text x="730" y="235" text-anchor="middle" fill="#c8a08a" font-family="system-ui, sans-serif" font-size="9">Latência · Custo</text>
  <text x="730" y="248" text-anchor="middle" fill="#c8a08a" font-family="system-ui, sans-serif" font-size="9">Hallucination rate</text>
  <text x="730" y="261" text-anchor="middle" fill="#c8a08a" font-family="system-ui, sans-serif" font-size="9">Satisfação</text>

  <!-- Arrow 3 -->
  <line x1="820" y1="215" x2="880" y2="215" stroke="#00c896" stroke-width="2"/>
  <polygon points="880,210 890,215 880,220" fill="#00c896"/>

  <!-- Flywheel box -->
  <rect x="890" y="155" width="180" height="120" rx="10" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
  <rect x="890" y="155" width="180" height="120" rx="10" fill="#ffd700" fill-opacity="0.1"/>
  <text x="980" y="190" text-anchor="middle" fill="#ffd700" font-family="system-ui, sans-serif" font-size="14" font-weight="700">FLYWHEEL</text>
  <text x="980" y="215" text-anchor="middle" fill="#c8b060" font-family="system-ui, sans-serif" font-size="10">Colete falhas</text>
  <text x="980" y="232" text-anchor="middle" fill="#c8b060" font-family="system-ui, sans-serif" font-size="10">Adicione ao dataset</text>
  <text x="980" y="249" text-anchor="middle" fill="#c8b060" font-family="system-ui, sans-serif" font-size="10">Reavalie</text>
  <text x="980" y="266" text-anchor="middle" fill="#c8b060" font-family="system-ui, sans-serif" font-size="10">Melhore o modelo</text>

  <!-- Circular arrow from Flywheel back to Golden Dataset -->
  <path d="M 980 275 Q 980 330 980 360 Q 980 390 560 390 Q 230 390 230 360 Q 230 340 230 255" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <polygon points="225,260 230,248 235,260" fill="#ffd700" opacity="0.6"/>

  <!-- Metrics comparison bars -->
  <rect x="140" y="420" width="920" height="2" fill="#1a3a5a" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="70" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">Avaliação de LLMs e Agentes IA</text>
  <text x="600" y="105" text-anchor="middle" fill="#00c896" font-family="system-ui, sans-serif" font-size="18" font-weight="500">O guia prático para produção que ninguém te dá</text>

  <!-- Bottom metrics display -->
  <g transform="translate(140, 440)">
    <!-- Faithfulness metric -->
    <rect x="0" y="0" width="260" height="70" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#00c896" stroke-width="1" opacity="0.7"/>
    <text x="15" y="25" fill="#00c896" font-family="monospace" font-size="11" font-weight="600">FAITHFULNESS</text>
    <rect x="15" y="38" width="180" height="12" rx="6" fill="#1a2d4a"/>
    <rect x="15" y="38" width="144" height="12" rx="6" fill="#00c896" opacity="0.8"/>
    <text x="210" y="50" fill="#8ab4c8" font-family="monospace" font-size="10">80%</text>

    <!-- Relevancy metric -->
    <rect x="280" y="0" width="260" height="70" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#00a3ff" stroke-width="1" opacity="0.7"/>
    <text x="295" y="25" fill="#00a3ff" font-family="monospace" font-size="11" font-weight="600">RELEVANCY</text>
    <rect x="295" y="38" width="180" height="12" rx="6" fill="#1a2d4a"/>
    <rect x="295" y="38" width="153" height="12" rx="6" fill="#00a3ff" opacity="0.8"/>
    <text x="490" y="50" fill="#8ab4c8" font-family="monospace" font-size="10">85%</text>

    <!-- Recall@K metric -->
    <rect x="560" y="0" width="260" height="70" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#ff6b35" stroke-width="1" opacity="0.7"/>
    <text x="575" y="25" fill="#ff6b35" font-family="monospace" font-size="11" font-weight="600">RECALL@5</text>
    <rect x="575" y="38" width="180" height="12" rx="6" fill="#1a2d4a"/>
    <rect x="575" y="38" width="126" height="12" rx="6" fill="#ff6b35" opacity="0.8"/>
    <text x="770" y="50" fill="#8ab4c8" font-family="monospace" font-size="10">70%</text>

    <!-- Latency metric -->
    <rect x="840" y="0" width="200" height="70" rx="8" fill="#ffffff" fill-opacity="0.05" stroke="#ffd700" stroke-width="1" opacity="0.7"/>
    <text x="855" y="25" fill="#ffd700" font-family="monospace" font-size="11" font-weight="600">LATÊNCIA P95</text>
    <text x="940" y="52" text-anchor="middle" fill="#ffd700" font-family="monospace" font-size="22" font-weight="700">2.8s</text>
  </g>

  <!-- BaXiJen branding -->
  <text x="600" y="580" text-anchor="middle" fill="#4a6a8a" font-family="system-ui, sans-serif" font-size="12" font-weight="400">BaXiJen · Antes de tudo, Brasileiro.</text>

  <!-- Corner accent -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGrad)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#accentGrad)"/>

  <!-- Checkmark icons in boxes -->
  <circle cx="170" cy="195" r="10" fill="#00c896" fill-opacity="0.2" stroke="#00c896" stroke-width="1"/>
  <path d="M166,195 L169,198 L175,192" fill="none" stroke="#00c896" stroke-width="1.5"/>

  <circle cx="420" cy="175" r="10" fill="#00a3ff" fill-opacity="0.2" stroke="#00a3ff" stroke-width="1"/>
  <path d="M416,175 L419,178 L425,172" fill="none" stroke="#00a3ff" stroke-width="1.5"/>

  <circle cx="670" cy="175" r="10" fill="#ff6b35" fill-opacity="0.2" stroke="#ff6b35" stroke-width="1"/>
  <path d="M666,175 L669,178 L675,172" fill="none" stroke="#ff6b35" stroke-width="1.5"/>

  <circle cx="920" cy="175" r="10" fill="#ffd700" fill-opacity="0.2" stroke="#ffd700" stroke-width="1"/>
  <path d="M916,175 L919,178 L925,172" fill="none" stroke="#ffd700" stroke-width="1.5"/>

  <!-- Date/author -->
  <text x="1100" y="600" text-anchor="end" fill="#4a6a8a" font-family="system-ui, sans-serif" font-size="10">Jun 2025 · Leonardo Camilo</text>
</svg>