  <text x="130" y="282" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#C9D1D9">reportam ROI mensurável</text>
  <text x="130" y="297" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">Anthropic/Material 2026</text>

