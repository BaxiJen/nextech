  <text x="258" y="546" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">Marketing 6,7</text>

  <rect x="340" y="535" width="86" height="14" rx="2" fill="#58A6FF" opacity="0.5"/>
  <text x="435" y="546" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">SDR 7,2</text>

  <rect x="480" y="535" width="96" height="14" rx="2" fill="#58A6FF" opacity="0.4"/>
  <text x="585" y="546" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">TI 8,0</text>

  <rect x="620" y="535" width="112" height="14" rx="2" fill="#D29922" opacity="0.4"/>
  <text x="742" y="546" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">Eng 9,3</text>

  <rect x="790" y="535" width="121" height="14" rx="2" fill="#D29922" opacity="0.3"/>
  <text x="920" y="546" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">Fin 10,1</text>

