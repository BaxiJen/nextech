  <text x="780" y="440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#58A6FF" text-anchor="middle">$207M</text>
  <text x="780" y="465" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">orçamento médio de IA/12mo</text>
