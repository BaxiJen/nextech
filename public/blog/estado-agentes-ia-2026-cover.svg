  <text x="560" y="465" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">redução de custo por tarefa</text>
  <text x="560" y="480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#484F58" text-anchor="middle">Forrester TEI 2026</text>

