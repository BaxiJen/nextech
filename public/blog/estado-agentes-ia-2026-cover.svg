  <text x="640" y="210" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#F85149">42%</text>

  <text x="260" y="248" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#C9D1D9">Gestão de mudança</text>
  <rect x="430" y="236" width="230" height="20" rx="3" fill="#21262D"/>
