  <!-- Title section -->
  <text x="60" y="55" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#F0F6FC">
    Estado dos Agentes IA em 2026
  </text>
  <text x="60" y="85" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#8B949E">
    O que 500+ líderes técnicos revelaram sobre produção, ROI e gargalos reais
  </text>

  <!-- LEFT SIDE: Adoption Funnel -->
