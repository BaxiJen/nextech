  <text x="125" y="227" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#C9D1D9">agentes em produção</text>
  <text x="125" y="242" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#8B949E">KPMG Q1 2026</text>

