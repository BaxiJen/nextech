<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c896"/>
      <stop offset="100%" stop-color="#00e6a0"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7b731"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2a4a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a1e38" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00c896" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="200" y1="0" x2="1200" y2="500"/>
    <line x1="400" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="100" x2="1000" y2="630"/>
    <line x1="0" y1="200" x2="800" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="1000" y1="0" x2="0" y2="500"/>
    <line x1="800" y1="0" x2="0" y2="400"/>
    <line x1="1200" y1="100" x2="200" y2="630"/>
    <line x1="1200" y1="200" x2="400" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="180" fill="#00c896" opacity="0.04"/>
  <circle cx="1100" cy="60" r="120" fill="#00e6a0" opacity="0.03"/>
  <circle cx="150" cy="550" r="140" fill="#f7b731" opacity="0.04"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- BaXiJen branding -->
  <rect x="50" y="30" width="4" height="28" rx="2" fill="#00c896"/>
  <text x="64" y="50" fill="#ffffff" font-size="16" font-weight="600" letter-spacing="0.5">BaXiJen</text>
  <text x="64" y="67" fill="#8aa8c7" font-size="10" letter-spacing="1">BLOG</text>

  <!-- Main title -->
  <text x="50" y="135" fill="#ffffff" font-size="36" font-weight="700" letter-spacing="-0.5">IA no Setor Público Brasileiro</text>
  <text x="50" y="175" fill="#00c896" font-size="32" font-weight="600">em 2026: Oportunidades e Barreiras</text>
  <text x="50" y="215" fill="#8aa8c7" font-size="22" font-weight="400">Após o Marco Legal</text>

  <!-- Divider -->
  <rect x="50" y="240" width="80" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Three pillar cards -->
  <!-- Card 1: Marco Legal -->
  <rect x="50" y="270" width="340" height="160" rx="12" fill="url(#card1)" stroke="#00c896" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="70" y="290" width="32" height="32" rx="8" fill="#00c896" opacity="0.15"/>
  <text x="82" y="312" fill="#00c896" font-size="18">⚖️</text>
  <text x="112" y="308" fill="#ffffff" font-size="16" font-weight="600">Marco Legal (PL 2688)</text>
  <text x="70" y="340" fill="#8aa8c7" font-size="12">Classificação baseada em risco</text>
  <text x="70" y="358" fill="#8aa8c7" font-size="12">Responsabilidade objetiva: alto risco</text>
  <text x="70" y="376" fill="#8aa8c7" font-size="12">Sandboxes regulatórios</text>
  <text x="70" y="394" fill="#8aa8c7" font-size="12">Multas até R$ 50M / infração</text>
  <text x="70" y="415" fill="#00c896" font-size="11" font-weight="600">✓ APROVADO CCom 18/03/2026</text>

  <!-- Card 2: Portaria MGI -->
  <rect x="430" y="270" width="340" height="160" rx="12" fill="url(#card1)" stroke="#f7b731" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="450" y="290" width="32" height="32" rx="8" fill="#f7b731" opacity="0.15"/>
  <text x="462" y="312" fill="#f7b731" font-size="18">🏛️</text>
  <text x="492" y="308" fill="#ffffff" font-size="16" font-weight="600">Portaria MGI 3.485/2026</text>
  <text x="450" y="340" fill="#8aa8c7" font-size="12">Governança obrigatória: gov. federal</text>
  <text x="450" y="358" fill="#8aa8c7" font-size="12">Supervisão humana obrigatória</text>
  <text x="450" y="376" fill="#8aa8c7" font-size="12">3 camadas: Alta Adm → Comitê → Subcomitê</text>
  <text x="450" y="394" fill="#8aa8c7" font-size="12">Alinhamento LGPD obrigatório</text>
  <text x="450" y="415" fill="#f7b731" font-size="11" font-weight="600">✓ PUBLICADA NO DOU</text>

  <!-- Card 3: PBIA -->
  <rect x="810" y="270" width="340" height="160" rx="12" fill="url(#card1)" stroke="#5b8def" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="830" y="290" width="32" height="32" rx="8" fill="#5b8def" opacity="0.15"/>
  <text x="842" y="312" fill="#5b8def" font-size="18">💰</text>
  <text x="872" y="308" fill="#ffffff" font-size="16" font-weight="600">PBIA: R$ 23 Bilhões</text>
  <text x="830" y="340" fill="#8aa8c7" font-size="12">Serviços públicos: R$ 1,76 bi</text>
  <text x="830" y="358" fill="#8aa8c7" font-size="12">Infraestrutura: R$ 5,79 bi</text>
  <text x="830" y="376" fill="#8aa8c7" font-size="12">Inovação em empresas: R$ 2,31 bi</text>
  <text x="830" y="394" fill="#8aa8c7" font-size="12">54 ações estruturantes até 2028</text>
  <text x="830" y="415" fill="#5b8def" font-size="11" font-weight="600">✓ EM EXECUÇÃO</text>

  <!-- Bottom data bar -->
  <rect x="50" y="460" width="1100" height="1" fill="#1e3a5f" opacity="0.5"/>

  <!-- Stats row -->
  <text x="50" y="500" fill="#8aa8c7" font-size="11" letter-spacing="0.5">DADOS CHAVE</text>

  <text x="50" y="528" fill="#ffffff" font-size="22" font-weight="700">72%</text>
  <text x="105" y="528" fill="#8aa8c7" font-size="12">das PMEs sem governança de dados (ABDI, 2025)</text>

  <text x="470" y="528" fill="#ffffff" font-size="22" font-weight="700">18</text>
  <text x="505" y="528" fill="#8aa8c7" font-size="12">meses de vacância para multas</text>

  <text x="750" y="528" fill="#ffffff" font-size="22" font-weight="700">US$ 5 bi</text>
  <text x="835" y="528" fill="#8aa8c7" font-size="12">em investimentos potenciais (CGI.br)</text>

  <!-- Author -->
  <text x="50" y="580" fill="#8aa8c7" font-size="12">Por Luiz Felipe Barbedo · Head de Business Development na BaXiJen</text>
  <text x="50" y="600" fill="#5a7a9a" font-size="11">baxijen.com.br/blog</text>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="1150" y="600" fill="#00c896" font-size="10" font-weight="600" text-anchor="end" letter-spacing="0.5">Antes de tudo, Brasileiro. 🇧🇷</text>
</svg>