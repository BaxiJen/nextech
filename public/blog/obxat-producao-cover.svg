<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C897"/>
      <stop offset="100%" stop-color="#00A3FF"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1C2333"/>
      <stop offset="100%" stop-color="#141924"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#00C897">
    <line x1="0" y1="0" x2="0" y2="630" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke-width="1"/>
  </g>

  <!-- Architecture diagram: left side -->
  <g transform="translate(80, 160)">
    <!-- Gestor box -->
    <rect x="0" y="0" width="140" height="50" rx="8" fill="url(#card)" stroke="#00C897" stroke-width="1.5"/>
    <text x="70" y="20" text-anchor="middle" fill="#00C897" font-size="11" font-weight="600">GESTOR</text>
    <text x="70" y="37" text-anchor="middle" fill="#8B949E" font-size="9">Público Municipal</text>

    <!-- Arrow down -->
    <line x1="70" y1="50" x2="70" y2="80" stroke="#00C897" stroke-width="1.5" stroke-dasharray="4"/>
    <polygon points="65,78 70,86 75,78" fill="#00C897"/>

    <!-- Guardrails box -->
    <rect x="0" y="86" width="140" height="50" rx="8" fill="url(#card)" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="70" y="106" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">GUARDRAILS</text>
    <text x="70" y="123" text-anchor="middle" fill="#8B949E" font-size="9">NeMo + Output Filter</text>

    <!-- Arrow down -->
    <line x1="70" y1="136" x2="70" y2="166" stroke="#00C897" stroke-width="1.5" stroke-dasharray="4"/>
    <polygon points="65,164 70,172 75,164" fill="#00C897"/>

    <!-- SLM box -->
    <rect x="0" y="172" width="140" height="60" rx="8" fill="url(#card)" stroke="#00A3FF" stroke-width="2"/>
    <text x="70" y="194" text-anchor="middle" fill="#00A3FF" font-size="13" font-weight="700">OBXat</text>
    <text x="70" y="211" text-anchor="middle" fill="#8B949E" font-size="9">SLM 14B · On-Prem</text>
    <text x="70" y="224" text-anchor="middle" fill="#58A6FF" font-size="8">&lt;200ms p95</text>

    <!-- Arrow right from SLM -->
    <line x1="140" y1="202" x2="180" y2="202" stroke="#00A3FF" stroke-width="1.5" stroke-dasharray="4"/>
    <polygon points="178,197 186,202 178,207" fill="#00A3FF"/>

    <!-- RAG box -->
    <rect x="186" y="172" width="140" height="60" rx="8" fill="url(#card)" stroke="#A78BFA" stroke-width="1.5"/>
    <text x="256" y="194" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="600">RAG</text>
    <text x="256" y="209" text-anchor="middle" fill="#8B949E" font-size="9">Portarias · INs</text>
    <text x="256" y="222" text-anchor="middle" fill="#8B949E" font-size="9">Licitações · MGI</text>

    <!-- Hardware indicator -->
    <rect x="0" y="250" width="326" height="34" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="163" y="270" text-anchor="middle" fill="#8B949E" font-size="10">🖥️ RTX 3060 12GB · R$3.000 · 200+ sessões</text>
  </g>

  <!-- Title area: right side -->
  <g transform="translate(520, 0)">
    <!-- Tag -->
    <rect x="0" y="40" width="80" height="24" rx="12" fill="#00C897" fill-opacity="0.15"/>
    <text x="40" y="56" text-anchor="middle" fill="#00C897" font-size="11" font-weight="600">DEPLOY</text>

    <!-- Main title -->
    <text x="0" y="120" fill="#FFFFFF" font-size="36" font-weight="800" letter-spacing="-0.5">OBXat em produção:</text>
    <text x="0" y="168" fill="#FFFFFF" font-size="34" font-weight="700" letter-spacing="-0.5">lições de deploy de SLM</text>
    <text x="0" y="210" fill="#00C897" font-size="30" font-weight="700">para gestão pública</text>

    <!-- Subtitle -->
    <text x="0" y="260" fill="#8B949E" font-size="16" font-weight="400">Latência, soberania de dados, fine-tuning dominial</text>
    <text x="0" y="284" fill="#8B949E" font-size="16" font-weight="400">e os erros que não se repete.</text>

    <!-- Stats row -->
    <g transform="translate(0, 330)">
      <rect x="0" y="0" width="160" height="70" rx="8" fill="url(#card)" stroke="#30363D" stroke-width="1"/>
      <text x="80" y="25" text-anchor="middle" fill="#00C897" font-size="22" font-weight="800">&lt;200ms</text>
      <text x="80" y="48" text-anchor="middle" fill="#8B949E" font-size="10">Latência p95</text>

      <rect x="180" y="0" width="160" height="70" rx="8" fill="url(#card)" stroke="#30363D" stroke-width="1"/>
      <text x="260" y="25" text-anchor="middle" fill="#00A3FF" font-size="22" font-weight="800">75%</text>
      <text x="260" y="48" text-anchor="middle" fill="#8B949E" font-size="10">Redução de custo</text>

      <rect x="360" y="0" width="160" height="70" rx="8" fill="url(#card)" stroke="#30363D" stroke-width="1"/>
      <text x="440" y="25" text-anchor="middle" fill="#F59E0B" font-size="22" font-weight="800">3 camadas</text>
      <text x="440" y="48" text-anchor="middle" fill="#8B949E" font-size="10">De guardrails</text>
    </g>

    <!-- Author -->
    <g transform="translate(0, 440)">
      <text x="0" y="20" fill="#8B949E" font-size="12">Por</text>
      <text x="28" y="20" fill="#FFFFFF" font-size="13" font-weight="600">Leonardo Camilo</text>
      <text x="0" y="40" fill="#8B949E" font-size="11">CEO &amp; Tech Lead · BaXiJen</text>
      <text x="0" y="60" fill="#30363D" font-size="11">25 de maio de 2026</text>
    </g>
  </g>

  <!-- BaXiJen logo bottom right -->
  <g transform="translate(1040, 570)">
    <rect x="0" y="0" width="140" height="36" rx="6" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <text x="70" y="14" text-anchor="middle" fill="#00C897" font-size="12" font-weight="700">BaXiJen</text>
    <text x="70" y="30" text-anchor="middle" fill="#8B949E" font-size="8">Antes de tudo, Brasileiro.</text>
  </g>

  <!-- Brazil flag accent -->
  <g transform="translate(1140, 590)">
    <rect x="0" y="0" width="18" height="12" rx="2" fill="#009739"/>
    <polygon points="9,1 16,6 9,11" fill="#FFDF00"/>
    <circle cx="9" cy="6" r="3" fill="#002776"/>
  </g>
</svg>