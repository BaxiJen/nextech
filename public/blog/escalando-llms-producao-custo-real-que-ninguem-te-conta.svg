<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#111936"/>
      <stop offset="100%" stop-color="#0d1330"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Left panel: GPU/Server icon cluster -->
  <g transform="translate(80, 140)">
    <!-- Server 1 -->
    <rect x="0" y="0" width="220" height="70" rx="8" fill="#151d3a" stroke="#00d4aa" stroke-width="1.5" opacity="0.9"/>
    <circle cx="25" cy="20" r="5" fill="#00d4aa"/><circle cx="25" cy="20" r="3" fill="#00ffcc"/>
    <text x="45" y="24" fill="#a8b5d1" font-size="11" font-weight="500">GPU A100</text>
    <text x="45" y="44" fill="#6b7a99" font-size="9">80GB VRAM · US$ 3.50/h</text>
    <rect x="140" y="14" width="70" height="42" rx="4" fill="#0d1330" stroke="#2a3555" stroke-width="0.5"/>
    <text x="175" y="30" fill="#00d4aa" font-size="8" text-anchor="middle" font-weight="600">73%</text>
    <text x="175" y="46" fill="#6b7a99" font-size="7" text-anchor="middle">UTIL</text>

    <!-- Server 2 -->
    <rect x="0" y="85" width="220" height="70" rx="8" fill="#151d3a" stroke="#ff6b35" stroke-width="1.5" opacity="0.9"/>
    <circle cx="25" cy="105" r="5" fill="#ff6b35"/><circle cx="25" cy="105" r="3" fill="#ff8855"/>
    <text x="45" y="109" fill="#a8b5d1" font-size="11" font-weight="500">RTX 4090</text>
    <text x="45" y="129" fill="#6b7a99" font-size="9">24GB VRAM · US$ 0.40/h</text>
    <rect x="140" y="99" width="70" height="42" rx="4" fill="#0d1330" stroke="#2a3555" stroke-width="0.5"/>
    <text x="175" y="115" fill="#ff6b35" font-size="8" text-anchor="middle" font-weight="600">40%</text>
    <text x="175" y="131" fill="#6b7a99" font-size="7" text-anchor="middle">UTIL</text>

    <!-- Server 3 (On-prem) -->
    <rect x="0" y="170" width="220" height="70" rx="8" fill="#151d3a" stroke="#4e8cff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="25" cy="190" r="5" fill="#4e8cff"/><circle cx="25" cy="190" r="3" fill="#70a8ff"/>
    <text x="45" y="194" fill="#a8b5d1" font-size="11" font-weight="500">On-Prem GPU</text>
    <text x="45" y="214" fill="#6b7a99" font-size="9">Payback 8-14 meses</text>
    <rect x="140" y="184" width="70" height="42" rx="4" fill="#0d1330" stroke="#2a3555" stroke-width="0.5"/>
    <text x="175" y="200" fill="#4e8cff" font-size="8" text-anchor="middle" font-weight="600">85%</text>
    <text x="175" y="216" fill="#6b7a99" font-size="7" text-anchor="middle">UTIL</text>
  </g>

  <!-- Center: Cost comparison bars -->
  <g transform="translate(370, 120)">
    <text x="200" y="0" fill="#e8ecf4" font-size="14" text-anchor="middle" font-weight="700" letter-spacing="1">CUSTO MENSAL POR GPU (US$)</text>

    <!-- Cloud bar -->
    <text x="0" y="40" fill="#a8b5d1" font-size="11" font-weight="500">Cloud (AWS)</text>
    <rect x="120" y="26" width="280" height="22" rx="4" fill="#1a2444" stroke="#2a3555" stroke-width="0.5"/>
    <rect x="120" y="26" width="260" height="22" rx="4" fill="url(#accent)" opacity="0.8"/>
    <text x="390" y="42" fill="#00d4aa" font-size="12" font-weight="700">$2,500+</text>

    <!-- On-prem bar -->
    <text x="0" y="85" fill="#a8b5d1" font-size="11" font-weight="500">On-Prem</text>
    <rect x="120" y="71" width="280" height="22" rx="4" fill="#1a2444" stroke="#2a3555" stroke-width="0.5"/>
    <rect x="120" y="71" width="56" height="22" rx="4" fill="#4e8cff" opacity="0.8"/>
    <text x="186" y="87" fill="#4e8cff" font-size="12" font-weight="700">~$500</text>

    <!-- Labels -->
    <text x="200" y="130" fill="#6b7a99" font-size="9" text-anchor="middle">(energia + manutenção)</text>

    <!-- Divider -->
    <line x1="0" y1="155" x2="400" y2="155" stroke="#2a3555" stroke-width="1"/>

    <!-- Strategy icons -->
    <text x="200" y="185" fill="#e8ecf4" font-size="13" text-anchor="middle" font-weight="700" letter-spacing="1">ESTRATÉGIAS DE OTIMIZAÇÃO</text>

    <!-- Strategy boxes -->
    <g transform="translate(0, 200)">
      <!-- Cache -->
      <rect x="0" y="0" width="190" height="55" rx="8" fill="#151d3a" stroke="#00d4aa" stroke-width="1"/>
      <text x="15" y="22" fill="#00d4aa" font-size="10" font-weight="700">CACHE</text>
      <text x="15" y="38" fill="#a8b5d1" font-size="9">Alto impacto · Baixo risco</text>

      <!-- Routing -->
      <rect x="205" y="0" width="190" height="55" rx="8" fill="#151d3a" stroke="#00d4aa" stroke-width="1"/>
      <text x="220" y="22" fill="#00d4aa" font-size="10" font-weight="700">ROTEAMENTO</text>
      <text x="220" y="38" fill="#a8b5d1" font-size="9">Alto impacto · Médio risco</text>
    </g>

    <g transform="translate(0, 270)">
      <!-- Batching -->
      <rect x="0" y="0" width="190" height="55" rx="8" fill="#151d3a" stroke="#ff6b35" stroke-width="1"/>
      <text x="15" y="22" fill="#ff6b35" font-size="10" font-weight="700">BATCHING</text>
      <text x="15" y="38" fill="#a8b5d1" font-size="9">Médio impacto · Baixo risco</text>

      <!-- Quantization -->
      <rect x="205" y="0" width="190" height="55" rx="8" fill="#151d3a" stroke="#ff6b35" stroke-width="1"/>
      <text x="220" y="22" fill="#ff6b35" font-size="10" font-weight="700">QUANTIZAÇÃO</text>
      <text x="220" y="38" fill="#a8b5d1" font-size="9">Médio impacto · Médio risco</text>
    </g>

    <!-- Savings badge -->
    <g transform="translate(130, 350)">
      <circle cx="70" cy="30" r="40" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1.5"/>
      <text x="70" y="24" fill="#00d4aa" font-size="20" text-anchor="middle" font-weight="800">70%</text>
      <text x="70" y="42" fill="#00d4aa" font-size="8" text-anchor="middle" font-weight="600">ECONOMIA</text>
    </g>
  </g>

  <!-- Right panel: Throughput comparison -->
  <g transform="translate(830, 140)">
    <text x="150" y="0" fill="#e8ecf4" font-size="13" text-anchor="middle" font-weight="700" letter-spacing="1">THROUGHPUT COM vLLM</text>

    <!-- Bar chart -->
    <rect x="20" y="25" width="55" height="180" rx="4" fill="#1a2444" stroke="#2a3555" stroke-width="0.5"/>
    <rect x="20" y="85" width="55" height="120" rx="4" fill="#ff6b35" opacity="0.7"/>
    <text x="47" y="75" fill="#ff6b35" font-size="10" text-anchor="middle" font-weight="700">1x</text>
    <text x="47" y="220" fill="#6b7a99" font-size="9" text-anchor="middle">TGI</text>

    <rect x="95" y="25" width="55" height="180" rx="4" fill="#1a2444" stroke="#2a3555" stroke-width="0.5"/>
    <rect x="95" y="35" width="55" height="170" rx="4" fill="#00d4aa" opacity="0.8"/>
    <text x="122" y="28" fill="#00d4aa" font-size="10" text-anchor="middle" font-weight="700">2-24x</text>
    <text x="122" y="220" fill="#6b7a99" font-size="9" text-anchor="middle">vLLM</text>

    <text x="85" y="260" fill="#6b7a99" font-size="9" text-anchor="middle">PagedAttention: 60-80%</text>
    <text x="85" y="275" fill="#6b7a99" font-size="9" text-anchor="middle">menos desperdício de memória</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent)" opacity="0.1"/>
  <rect x="0" y="600" width="1200" height="3" fill="url(#accent)"/>

  <!-- BaXiJen branding -->
  <text x="80" y="570" fill="#6b7a99" font-size="11" font-weight="500">BaXiJen</text>
  <text x="80" y="586" fill="#4a5570" font-size="9">Antes de tudo, Brasileiro.</text>

  <!-- Main title -->
  <text x="600" y="560" fill="#e8ecf4" font-size="22" text-anchor="middle" font-weight="800" letter-spacing="2">ESCALANDO LLMs EM PRODUÇÃO</text>
  <text x="600" y="585" fill="#00d4aa" font-size="14" text-anchor="middle" font-weight="600">O Custo Real Que Ninguém Te Conta</text>

  <!-- Author -->
  <text x="1120" y="572" fill="#6b7a99" font-size="10" text-anchor="end">Marcus Ramalho · CTO</text>
  <text x="1120" y="586" fill="#4a5570" font-size="9" text-anchor="end">03/06/2026</text>
</svg>