<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#121842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1230;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.95" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/><line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/><line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#4f46e5" opacity="0.03"/>
  <circle cx="200" cy="500" r="180" fill="#06b6d4" opacity="0.03"/>

  <!-- Central MCP Architecture Diagram -->
  <!-- AI Client Node (left) -->
  <rect x="120" y="270" width="160" height="90" rx="12" fill="url(#nodeGrad)" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="200" y="305" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">AI APPLICATION</text>
  <text x="200" y="325" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">MCP Client</text>
  <text x="200" y="345" text-anchor="middle" fill="#64748b" font-size="9">Claude, ChatGPT, Cursor</text>

  <!-- MCP Protocol Arrow (center) -->
  <line x1="280" y1="315" x2="440" y2="315" stroke="url(#accent1)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="440,310 450,315 440,320" fill="#7c3aed"/>
  <line x1="440" y1="315" x2="600" y2="315" stroke="url(#accent2)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="600,310 610,315 600,320" fill="#06b6d4"/>

  <!-- Protocol label -->
  <rect x="380" y="280" width="120" height="26" rx="13" fill="#4f46e5" opacity="0.15" stroke="#4f46e5" stroke-width="0.5"/>
  <text x="440" y="298" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">JSON-RPC 2.0</text>
  <text x="440" y="355" text-anchor="middle" fill="#64748b" font-size="9">Resources · Tools · Prompts</text>

  <!-- MCP Server Node (center) -->
  <rect x="440" y="370" width="160" height="80" rx="12" fill="url(#nodeGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="520" y="400" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">PROTOCOL</text>
  <text x="520" y="420" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">MCP Server</text>
  <text x="520" y="438" text-anchor="middle" fill="#64748b" font-size="9">Dynamic Discovery</text>

  <!-- Data Sources (right side) -->
  <rect x="740" y="195" width="140" height="55" rx="10" fill="url(#nodeGrad)" stroke="#06b6d4" stroke-width="1"/>
  <text x="810" y="218" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">POSTGRES</text>
  <text x="810" y="237" text-anchor="middle" fill="#64748b" font-size="9">Database</text>

  <rect x="740" y="270" width="140" height="55" rx="10" fill="url(#nodeGrad)" stroke="#06b6d4" stroke-width="1"/>
  <text x="810" y="293" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">GITHUB</text>
  <text x="810" y="312" text-anchor="middle" fill="#64748b" font-size="9">Code Repository</text>

  <rect x="740" y="345" width="140" height="55" rx="10" fill="url(#nodeGrad)" stroke="#06b6d4" stroke-width="1"/>
  <text x="810" y="368" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">SLACK</text>
  <text x="810" y="387" text-anchor="middle" fill="#64748b" font-size="9">Messaging</text>

  <rect x="740" y="420" width="140" height="55" rx="10" fill="url(#nodeGrad)" stroke="#06b6d4" stroke-width="1"/>
  <text x="810" y="443" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">REST APIs</text>
  <text x="810" y="462" text-anchor="middle" fill="#64748b" font-size="9">External Services</text>

  <!-- Connection lines from MCP Server to Data Sources -->
  <line x1="600" y1="310" x2="740" y2="222" stroke="#4f46e5" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="600" y1="315" x2="740" y2="297" stroke="#4f46e5" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="600" y1="320" x2="740" y2="372" stroke="#4f46e5" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="600" y1="330" x2="740" y2="447" stroke="#4f46e5" stroke-width="1" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- N×M vs N+M comparison -->
  <rect x="920" y="195" width="240" height="120" rx="10" fill="#0f172a" opacity="0.7" stroke="#334155" stroke-width="0.5"/>
  <text x="1040" y="222" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">ANTES: N × M conectores</text>
  <text x="1040" y="242" text-anchor="middle" fill="#94a3b8" font-size="9">Cada modelo × cada ferramenta</text>
  <text x="1040" y="265" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">DEPOIS: N + M conectores</text>
  <text x="1040" y="285" text-anchor="middle" fill="#94a3b8" font-size="9">N clientes + M servidores</text>
  <text x="1040" y="305" text-anchor="middle" fill="#64748b" font-size="8">Complexidade O(n²) → O(n)</text>

  <!-- Stats row -->
  <rect x="920" y="340" width="240" height="110" rx="10" fill="#0f172a" opacity="0.7" stroke="#334155" stroke-width="0.5"/>
  <text x="1040" y="365" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="700">MCP EM NÚMEROS</text>
  <text x="980" y="390" text-anchor="middle" fill="#7c3aed" font-size="22" font-weight="800">10K+</text>
  <text x="1100" y="390" text-anchor="middle" fill="#06b6d4" font-size="22" font-weight="800">97M</text>
  <text x="980" y="408" text-anchor="middle" fill="#64748b" font-size="8">servidores</text>
  <text x="1100" y="408" text-anchor="middle" fill="#64748b" font-size="8">downloads/mês</text>
  <text x="1040" y="440" text-anchor="middle" fill="#94a3b8" font-size="9">OpenAI · Google · Microsoft · Anthropic</text>

  <!-- Title -->
  <text x="60" y="85" fill="#e2e8f0" font-size="38" font-weight="800" letter-spacing="-0.5">MCP</text>
  <text x="60" y="130" fill="#94a3b8" font-size="18" font-weight="400">Model Context Protocol</text>
  <text x="60" y="165" fill="#64748b" font-size="14" font-weight="300">O futuro da integração entre agentes e ferramentas</text>

  <!-- Author badge -->
  <rect x="60" y="560" width="200" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="80" y="583" fill="#94a3b8" font-size="11" font-weight="500">Por Marcus Ramalho</text>

  <!-- BaXiJen badge -->
  <rect x="280" y="560" width="130" height="36" rx="18" fill="url(#accent1)" opacity="0.9"/>
  <text x="345" y="583" text-anchor="middle" fill="white" font-size="11" font-weight="700">BaXiJen</text>

  <!-- Date -->
  <text x="1140" y="600" text-anchor="end" fill="#475569" font-size="10">Junho 2026</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent1)"/>
</svg>