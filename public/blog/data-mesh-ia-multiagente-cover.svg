<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1C"/>
      <stop offset="100%" style="stop-color:#141B2D"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00B894"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#A29BFE"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FD79A8"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00D4AA" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Title area -->
  <text x="80" y="80" fill="#00D4AA" font-size="14" font-weight="600" letter-spacing="3" opacity="0.8">BaXiJen — Blog</text>
  
  <text x="80" y="140" fill="#FFFFFF" font-size="38" font-weight="700" filter="url(#shadow)">Data Mesh para IA</text>
  <text x="80" y="190" fill="#E0E6ED" font-size="22" font-weight="400">Como estruturar dados quando múltiplos</text>
  <text x="80" y="222" fill="#E0E6ED" font-size="22" font-weight="400">agentes precisam acessar</text>

  <!-- Author -->
  <text x="80" y="280" fill="#8892A0" font-size="14">Luiz Felipe Barbedo · 11 de junho de 2026</text>

  <!-- Architecture Diagram -->
  <g transform="translate(680, 80)">
    <!-- Agent Layer -->
    <rect x="0" y="0" width="440" height="80" rx="8" fill="#1A2332" stroke="#6C5CE7" stroke-width="1.5" opacity="0.9"/>
    <text x="220" y="25" fill="#A29BFE" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="1">CAMADA DE AGENTES</text>
    
    <!-- Agent nodes -->
    <circle cx="60" cy="55" r="14" fill="#6C5CE7" opacity="0.8"/>
    <text x="60" y="59" fill="#FFF" font-size="9" text-anchor="middle" font-weight="600">R</text>
    <circle cx="160" cy="55" r="14" fill="#6C5CE7" opacity="0.8"/>
    <text x="160" y="59" fill="#FFF" font-size="9" text-anchor="middle" font-weight="600">C</text>
    <circle cx="260" cy="55" r="14" fill="#6C5CE7" opacity="0.8"/>
    <text x="260" y="59" fill="#FFF" font-size="9" text-anchor="middle" font-weight="600">A</text>
    <circle cx="360" cy="55" r="14" fill="#6C5CE7" opacity="0.8"/>
    <text x="360" y="59" fill="#FFF" font-size="9" text-anchor="middle" font-weight="600">F</text>

    <!-- Connection lines down -->
    <line x1="60" y1="80" x2="120" y2="130" stroke="#6C5CE7" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="80" x2="220" y2="130" stroke="#6C5CE7" stroke-width="1" opacity="0.5"/>
    <line x1="260" y1="80" x2="260" y2="130" stroke="#6C5CE7" stroke-width="1" opacity="0.5"/>
    <line x1="360" y1="80" x2="340" y2="130" stroke="#6C5CE7" stroke-width="1" opacity="0.5"/>
    
    <!-- Protocol labels -->
    <text x="60" y="110" fill="#A29BFE" font-size="9" opacity="0.7">MCP</text>
    <text x="340" y="110" fill="#A29BFE" font-size="9" opacity="0.7">ACP</text>

    <!-- Orchestration Layer -->
    <rect x="0" y="130" width="440" height="70" rx="8" fill="#1A2332" stroke="#00D4AA" stroke-width="1.5" opacity="0.9"/>
    <text x="220" y="155" fill="#00D4AA" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="1">ORQUESTRAÇÃO</text>
    <text x="220" y="178" fill="#8892A0" font-size="10" text-anchor="middle">Descoberta · Roteamento · Governança Runtime</text>

    <!-- Connection lines down -->
    <line x1="160" y1="200" x2="160" y2="240" stroke="#00D4AA" stroke-width="1" opacity="0.5"/>
    <line x1="280" y1="200" x2="280" y2="240" stroke="#00D4AA" stroke-width="1" opacity="0.5"/>

    <!-- Semantic Backbone -->
    <rect x="0" y="240" width="440" height="70" rx="8" fill="#1A2332" stroke="#FD79A8" stroke-width="1.5" opacity="0.9"/>
    <text x="220" y="265" fill="#FD79A8" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="1">BACKBONE SEMÂNTICO</text>
    <text x="220" y="288" fill="#8892A0" font-size="10" text-anchor="middle">Entidades · Regras · Mapeamento cross-domain</text>

    <!-- Connection lines down -->
    <line x1="80" y1="310" x2="80" y2="350" stroke="#FD79A8" stroke-width="1" opacity="0.5"/>
    <line x1="220" y1="310" x2="220" y2="350" stroke="#FD79A8" stroke-width="1" opacity="0.5"/>
    <line x1="360" y1="310" x2="360" y2="350" stroke="#FD79A8" stroke-width="1" opacity="0.5"/>

    <!-- Data Domains -->
    <rect x="0" y="350" width="440" height="80" rx="8" fill="#1A2332" stroke="#00B894" stroke-width="1.5" opacity="0.9"/>
    <text x="220" y="375" fill="#00D4AA" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="1">DOMÍNIOS DE DADOS</text>
    
    <!-- Domain boxes -->
    <rect x="15" y="392" width="70" height="28" rx="4" fill="#0D2818" stroke="#00B894" stroke-width="1"/>
    <text x="50" y="410" fill="#00D4AA" font-size="9" text-anchor="middle">Vendas</text>
    
    <rect x="100" y="392" width="70" height="28" rx="4" fill="#1A1030" stroke="#6C5CE7" stroke-width="1"/>
    <text x="135" y="410" fill="#A29BFE" font-size="9" text-anchor="middle">Financ.</text>
    
    <rect x="185" y="392" width="70" height="28" rx="4" fill="#1A1030" stroke="#A29BFE" stroke-width="1"/>
    <text x="220" y="410" fill="#A29BFE" font-size="9" text-anchor="middle">RH</text>
    
    <rect x="270" y="392" width="70" height="28" rx="4" fill="#1A0D18" stroke="#FD79A8" stroke-width="1"/>
    <text x="305" y="410" fill="#FD79A8" font-size="9" text-anchor="middle">Oper.</text>
    
    <rect x="355" y="392" width="70" height="28" rx="4" fill="#0D2818" stroke="#00B894" stroke-width="1"/>
    <text x="390" y="410" fill="#00D4AA" font-size="9" text-anchor="middle">Suporte</text>
  </g>

  <!-- Key stat callouts -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="200" height="70" rx="6" fill="#1A2332" stroke="#00D4AA" stroke-width="1" opacity="0.8"/>
    <text x="15" y="25" fill="#00D4AA" font-size="26" font-weight="700">1.445%</text>
    <text x="15" y="45" fill="#8892A0" font-size="11">surto em consultas</text>
    <text x="15" y="60" fill="#8892A0" font-size="11">multiagente (Gartner)</text>
  </g>
  
  <g transform="translate(80, 430)">
    <rect x="0" y="0" width="200" height="70" rx="6" fill="#1A2332" stroke="#FD79A8" stroke-width="1" opacity="0.8"/>
    <text x="15" y="25" fill="#FD79A8" font-size="26" font-weight="700">38%</text>
    <text x="15" y="45" fill="#8892A0" font-size="11">acurácia do melhor</text>
    <text x="15" y="60" fill="#8892A0" font-size="11">agente cross-domain (DAB)</text>
  </g>

  <g transform="translate(80, 520)">
    <rect x="0" y="0" width="200" height="70" rx="6" fill="#1A2332" stroke="#6C5CE7" stroke-width="1" opacity="0.8"/>
    <text x="15" y="25" fill="#A29BFE" font-size="26" font-weight="700">28%</text>
    <text x="15" y="45" fill="#8892A0" font-size="11">das Fortune 500 com</text>
    <text x="15" y="60" fill="#8892A0" font-size="11">MCP em produção (CData)</text>
  </g>

  <!-- BaXiJen logo area -->
  <text x="1080" y="595" fill="#00D4AA" font-size="13" font-weight="600" text-anchor="end" opacity="0.6">baxijen.com.br</text>
  
  <!-- Accent line -->
  <rect x="80" y="610" width="160" height="2" rx="1" fill="url(#accent1)" opacity="0.6"/>
</svg>