<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="graphGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="ragGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/><line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/><line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/><line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- LEFT SIDE: RAG (traditional) - scattered fragments -->
  <g transform="translate(120, 180)" opacity="0.7">
    <!-- Scattered text chunks representing RAG -->
    <rect x="0" y="0" width="160" height="40" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <text x="80" y="26" text-anchor="middle" fill="#f59e0b" font-size="11" opacity="0.8">chunk_042.txt</text>

    <rect x="40" y="60" width="140" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <text x="110" y="86" text-anchor="middle" fill="#ef4444" font-size="11" opacity="0.8">chunk_187.txt</text>

    <rect x="-10" y="120" width="130" height="40" rx="6" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <text x="55" y="146" text-anchor="middle" fill="#f59e0b" font-size="11" opacity="0.8">chunk_089.txt</text>

    <rect x="60" y="180" width="150" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <text x="135" y="206" text-anchor="middle" fill="#ef4444" font-size="11" opacity="0.8">chunk_312.txt</text>

    <!-- Question mark showing RAG can't connect -->
    <text x="90" y="270" text-anchor="middle" fill="#ef4444" font-size="22" font-weight="bold" filter="url(#glow)">?</text>
    <text x="90" y="300" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.7">sem conexão entre</text>
    <text x="90" y="316" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.7">entidades</text>
  </g>

  <!-- Label RAG -->
  <text x="210" y="160" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="600" opacity="0.9">RAG</text>
  <text x="210" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.7">busca por similaridade</text>

  <!-- CENTER: Arrow transforming -->
  <g transform="translate(420, 310)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="url(#graphGrad)" stroke-width="3" filter="url(#softGlow)"/>
    <polygon points="80,-8 96,0 80,8" fill="url(#graphGrad)" filter="url(#softGlow)"/>
  </g>

  <!-- RIGHT SIDE: Knowledge Graph - connected nodes -->
  <g transform="translate(560, 160)" filter="url(#glow)">
    <!-- Central entity: Empresa -->
    <circle cx="200" cy="150" r="28" fill="#0f172a" stroke="#06b6d4" stroke-width="2.5"/>
    <text x="200" y="146" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">Empresa</text>
    <text x="200" y="160" text-anchor="middle" fill="#22d3ee" font-size="9">X</text>

    <!-- Fornecedor node -->
    <circle cx="100" cy="60" r="22" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
    <text x="100" y="56" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Fornecedor</text>
    <text x="100" y="68" text-anchor="middle" fill="#a78bfa" font-size="8">A</text>

    <!-- Contrato node -->
    <circle cx="300" cy="70" r="22" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
    <text x="300" y="66" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="600">Contrato</text>
    <text x="300" y="78" text-anchor="middle" fill="#22d3ee" font-size="8">2024</text>

    <!-- Diretor node -->
    <circle cx="80" cy="230" r="22" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
    <text x="80" y="226" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Diretor</text>
    <text x="80" y="238" text-anchor="middle" fill="#a78bfa" font-size="8">João</text>

    <!-- Setor node -->
    <circle cx="320" cy="240" r="22" fill="#0f172a" stroke="#06b6d4" stroke-width="2"/>
    <text x="320" y="236" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="600">Setor</text>
    <text x="320" y="248" text-anchor="middle" fill="#22d3ee" font-size="8">TI</text>

    <!-- Renovação node -->
    <circle cx="370" cy="150" r="22" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
    <text x="370" y="146" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Renovado</text>
    <text x="370" y="158" text-anchor="middle" fill="#34d399" font-size="8">2025</text>

    <!-- Edges with labels -->
    <line x1="120" y1="72" x2="175" y2="135" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <text x="138" y="100" fill="#c4b5fd" font-size="8" opacity="0.8" transform="rotate(-25, 138, 100)">fornece_para</text>

    <line x1="225" y1="140" x2="280" y2="82" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <text x="260" y="110" fill="#67e8f9" font-size="8" opacity="0.8" transform="rotate(-35, 260, 110)">tem_contrato</text>

    <line x1="175" y1="165" x2="100" y2="215" stroke="#8b5cf6" stroke-width="1.5" opacity="0.7"/>
    <text x="125" y="195" fill="#c4b5fd" font-size="8" opacity="0.8" transform="rotate(30, 125, 195)">dirigida_por</text>

    <line x1="225" y1="165" x2="300" y2="225" stroke="#06b6d4" stroke-width="1.5" opacity="0.7"/>
    <text x="270" y="200" fill="#67e8f9" font-size="8" opacity="0.8" transform="rotate(30, 270, 200)">opera_em</text>

    <line x1="320" y1="88" x2="350" y2="132" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="348" y="105" fill="#6ee7b7" font-size="8" opacity="0.8" transform="rotate(55, 348, 105)">renovado</text>

    <!-- Check mark showing KG resolves -->
    <text x="220" y="290" text-anchor="middle" fill="#10b981" font-size="22" font-weight="bold" filter="url(#glow)">✓</text>
    <text x="220" y="312" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.7">relações explícitas</text>
    <text x="220" y="328" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.7">raciocínio multi-hop</text>
  </g>

  <!-- Label Knowledge Graph -->
  <text x="780" y="160" text-anchor="middle" fill="#06b6d4" font-size="16" font-weight="600" opacity="0.9">KNOWLEDGE GRAPH</text>
  <text x="780" y="178" text-anchor="middle" fill="#94a3b8" font-size="10" opacity="0.7">estrutura + relações + proveniência</text>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700" letter-spacing="-0.5">Knowledge Graphs para Agentes de IA</text>
  <text x="600" y="70" text-anchor="middle" fill="#94a3b8" font-size="16">Estruturando contexto além do RAG</text>

  <!-- Bottom bar with BaXiJen branding -->
  <rect x="0" y="580" width="1200" height="50" fill="#0f172a" opacity="0.9"/>
  <rect x="0" y="580" width="1200" height="2" fill="url(#graphGrad)" opacity="0.6"/>
  <text x="50" y="612" fill="#06b6d4" font-size="13" font-weight="700" letter-spacing="1">BaXiJen</text>
  <text x="145" y="612" fill="#94a3b8" font-size="11">Antes de tudo, Brasileiro.</text>
  <text x="1150" y="612" text-anchor="end" fill="#64748b" font-size="10">baxijen.com.br/blog</text>

  <!-- Stats callout -->
  <g transform="translate(940, 200)">
    <rect x="0" y="0" width="220" height="110" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1.5" opacity="0.9"/>
    <text x="110" y="28" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="600">GraphRAG vs RAG</text>
    <line x1="20" y1="38" x2="200" y2="38" stroke="#1e293b" stroke-width="1"/>
    <text x="20" y="58" fill="#94a3b8" font-size="10">Perguntas multi-hop</text>
    <text x="200" y="58" text-anchor="end" fill="#22d3ee" font-size="11" font-weight="600">+97%</text>
    <text x="20" y="78" fill="#94a3b8" font-size="10">Respostas completas</text>
    <text x="200" y="78" text-anchor="end" fill="#22d3ee" font-size="11" font-weight="600">3.4×</text>
    <text x="20" y="98" fill="#94a3b8" font-size="10">Redução de tokens (Nexus)</text>
    <text x="200" y="98" text-anchor="end" fill="#34d399" font-size="11" font-weight="600">98%</text>
  </g>

  <!-- Author badge -->
  <g transform="translate(940, 340)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#111827" stroke="#1e293b" stroke-width="1.5" opacity="0.9"/>
    <text x="20" y="25" fill="#8b5cf6" font-size="11" font-weight="600">Marcus Ramalho</text>
    <text x="20" y="45" fill="#64748b" font-size="10">CTO e Co-fundador, BaXiJen</text>
  </g>
</svg>