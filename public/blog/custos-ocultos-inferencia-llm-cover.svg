<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="50%" stop-color="#121835"/>
      <stop offset="100%" stop-color="#1A1F3D"/>
    </linearGradient>
    <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C896" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00A876" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="layerGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="layerGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="costBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#00C896"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- BaXiJen logo mark top right -->
  <g transform="translate(1090, 30)">
    <rect x="0" y="0" width="90" height="32" rx="6" fill="#00C896" opacity="0.15"/>
    <text x="45" y="21" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#00C896" text-anchor="middle">BaXiJen</text>
  </g>

  <!-- Title -->
  <text x="60" y="55" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#00C896" letter-spacing="2">CUSTOS OCULTOS DE INFERÊNCIA LLM</text>
  <text x="60" y="92" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#FFFFFF">GPU, Batching e Cache:</text>
  <text x="60" y="130" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#FFFFFF">5 Alavancas de Otimização</text>

  <!-- Stacked layers - left side -->
  <g transform="translate(60, 175)">
    <!-- Layer 1: Quantização -->
    <rect x="0" y="0" width="520" height="52" rx="8" fill="url(#layerGrad1)"/>
    <text x="20" y="24" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1. Quantização</text>
    <text x="20" y="42" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">FP8 lossless · INT8 1-3% perda · INT4 -75% VRAM</text>
    <text x="490" y="32" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="end">~50%</text>

    <!-- Layer 2: KV Cache -->
    <rect x="20" y="60" width="520" height="52" rx="8" fill="url(#layerGrad2)"/>
    <text x="40" y="84" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2. KV Cache (PagedAttention)</text>
    <text x="40" y="102" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">PagedAttention · Prefix caching · GQA/MQA</text>
    <text x="510" y="92" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="end">~65%</text>

    <!-- Layer 3: Continuous Batching -->
    <rect x="40" y="120" width="520" height="52" rx="8" fill="url(#layerGrad3)"/>
    <text x="60" y="144" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3. Continuous Batching</text>
    <text x="60" y="162" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">vLLM nativo · 2-3x throughput · GPU 70-80%</text>
    <text x="530" y="152" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="end">~75%</text>

    <!-- Layer 4: Speculative Decoding -->
    <rect x="60" y="180" width="520" height="52" rx="8" fill="url(#layerGrad4)"/>
    <text x="80" y="204" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4. Speculative Decoding</text>
    <text x="80" y="222" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">EAGLE 2-3x speedup · Lossless · ICLR 2026</text>
    <text x="550" y="212" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="end">~82%</text>

    <!-- Layer 5: Smart Routing -->
    <rect x="80" y="240" width="520" height="52" rx="8" fill="url(#layerGrad5)"/>
    <text x="100" y="264" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">5. Smart Routing</text>
    <text x="100" y="282" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.85">Router por regras/classificador · 40-70% blended</text>
    <text x="570" y="272" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF" text-anchor="end">~87%</text>
  </g>

  <!-- Right side: Cost collapse visualization -->
  <g transform="translate(660, 175)">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF" letter-spacing="1">CUSTO POR MILHÃO DE TOKENS</text>

    <!-- Cost bar -->
    <rect x="0" y="20" width="460" height="36" rx="6" fill="url(#costBar)" opacity="0.9"/>

    <!-- Start label -->
    <text x="10" y="42" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">US$ 20,00</text>
    <text x="10" y="72" font-family="Inter, Arial, sans-serif" font-size="11" fill="#EF4444" font-weight="600">Dez 2022</text>

    <!-- End label -->
    <text x="450" y="42" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="end">US$ 0,40</text>
    <text x="450" y="72" font-family="Inter, Arial, sans-serif" font-size="11" fill="#00C896" font-weight="600">Mar 2026</text>

    <!-- Arrow -->
    <line x1="10" y1="80" x2="450" y2="80" stroke="#4B5563" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="230" y="96" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1.000x de redução</text>

    <!-- Benchmark comparison -->
    <g transform="translate(0, 125)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="1">SEM OTIMIZAÇÃO vs COMPLETO</text>
      <rect x="0" y="12" width="230" height="44" rx="6" fill="#EF4444" opacity="0.25"/>
      <text x="10" y="30" font-family="Inter, Arial, sans-serif" font-size="12" fill="#EF4444" font-weight="700">Ingênuo</text>
      <text x="10" y="48" font-family="Inter, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="800">US$ 1,90</text>

      <rect x="250" y="12" width="210" height="44" rx="6" fill="#00C896" opacity="0.25"/>
      <text x="260" y="30" font-family="Inter, Arial, sans-serif" font-size="12" fill="#00C896" font-weight="700">Otimizado</text>
      <text x="260" y="48" font-family="Inter, Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="800">US$ 0,15</text>

      <text x="230" y="78" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#00C896" text-anchor="middle">12,6x</text>
    </g>
  </g>

  <!-- Author footer -->
  <g transform="translate(60, 570)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#374151" stroke-width="1"/>
    <text x="0" y="25" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#9CA3AF">Por Marcus Ramalho</text>
    <text x="160" y="25" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6B7280">CTO e Co-fundador na BaXiJen</text>
    <text x="1080" y="25" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#00C896" text-anchor="end">baxijen.com.br</text>
  </g>
</svg>