<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#3B82F6" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#E5E7EB" letter-spacing="2">
    CONFIABILIDADE DE AGENTES IA EM PRODUCAO
  </text>
  <text x="600" y="76" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#9CA3AF" letter-spacing="1">
    Por que 60% dos pilotos falham e como ser a excecao
  </text>

  <!-- LEFT SIDE: Failure Funnel -->
  <g transform="translate(60, 105)">
    <!-- Section label -->
    <rect x="0" y="0" width="500" height="32" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="250" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">O FUNIL DA MORTE</text>

    <!-- Funnel: 100% pilots -->
    <g transform="translate(50, 45)">
      <polygon points="0,0 400,0 360,40 40,40" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
      <text x="200" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#93C5FD">100% pilotos iniciados</text>
    </g>

    <!-- Funnel: 60-72% stall -->
    <g transform="translate(70, 95)">
      <polygon points="0,0 360,0 320,40 40,40" fill="#3B1C1C" stroke="url(#redGrad)" stroke-width="1.5" opacity="0.9"/>
      <text x="180" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FCA5A5">60-72% travam antes da producao</text>
    </g>

    <!-- Funnel: 35-45% deprecated -->
    <g transform="translate(100, 145)">
      <polygon points="0,0 300,0 260,40 40,40" fill="#3B1C1C" stroke="#EF4444" stroke-width="1.5" opacity="0.7"/>
      <text x="150" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#F87171">35-45% deprecados em 12 meses</text>
    </g>

    <!-- Funnel: surviving -->
    <g transform="translate(140, 195)">
      <polygon points="0,0 220,0 180,40 40,40" fill="#064E3B" stroke="url(#greenGrad)" stroke-width="1.5" opacity="0.8"/>
      <text x="110" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6EE7B7">sobrevivem em producao</text>
    </g>

    <!-- Failure mode breakdown -->
    <text x="250" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">MODOS DE FALHANCA EM PRODUCAO</text>

    <!-- Bar: Tool errors 28% -->
    <g transform="translate(20, 280)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#EF4444"/>
      <text x="22" y="11" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">Erros de ferramenta</text>
      <rect x="200" y="0" width="140" height="14" rx="2" fill="#EF4444" opacity="0.7"/>
      <text x="348" y="11" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FCA5A5">28%</text>
    </g>

    <!-- Bar: Memory 22% -->
    <g transform="translate(20, 302)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#F59E0B"/>
      <text x="22" y="11" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">Memoria e estado</text>
      <rect x="200" y="0" width="110" height="14" rx="2" fill="#F59E0B" opacity="0.7"/>
      <text x="318" y="11" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FCD34D">22%</text>
    </g>

    <!-- Bar: Edge cases 18% -->
    <g transform="translate(20, 324)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#3B82F6"/>
      <text x="22" y="11" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">Casos de borda</text>
      <rect x="200" y="0" width="90" height="14" rx="2" fill="#3B82F6" opacity="0.7"/>
      <text x="298" y="11" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#93C5FD">18%</text>
    </g>

    <!-- Bar: Hallucination 12% -->
    <g transform="translate(20, 346)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#8B5CF6"/>
      <text x="22" y="11" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">Alucinacao</text>
      <rect x="200" y="0" width="60" height="14" rx="2" fill="#8B5CF6" opacity="0.7"/>
      <text x="268" y="11" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#C4B5FD">12%</text>
    </g>

    <!-- Bar: Timeout 9% -->
    <g transform="translate(20, 368)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#6B7280"/>
      <text x="22" y="11" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">Timeout / loops</text>
      <rect x="200" y="0" width="45" height="14" rx="2" fill="#6B7280" opacity="0.7"/>
      <text x="253" y="11" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF">9%</text>
    </g>

    <!-- Bar: Auth 6% -->
    <g transform="translate(20, 390)">
      <rect x="0" y="0" width="14" height="14" rx="2" fill="#64748B"/>
      <text x="22" y="11" font-family="system-ui, sans-serif" font-size="11" fill="#D1D5DB">Autenticacao</text>
      <rect x="200" y="0" width="30" height="14" rx="2" fill="#64748B" opacity="0.7"/>
      <text x="238" y="11" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8">6%</text>
    </g>

    <!-- Source -->
    <text x="250" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Fonte: Presenc AI, BCG/McKinsey/IDC 2026</text>
  </g>

  <!-- Divider -->
  <line x1="600" y1="105" x2="600" y2="540" stroke="#334155" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- RIGHT SIDE: What works -->
  <g transform="translate(630, 105)">
    <!-- Section label -->
    <rect x="0" y="0" width="510" height="32" rx="6" fill="#06281D" stroke="url(#greenGrad)" stroke-width="1.5"/>
    <text x="255" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6EE7B7">O QUE SEPARA OS QUE SOBREVIVEM</text>

    <!-- Pattern 1: Narrow scope -->
    <g transform="translate(10, 50)">
      <rect x="0" y="0" width="490" height="80" rx="10" fill="#064E3B" stroke="#10B981" stroke-width="1" opacity="0.4"/>
      <circle cx="35" cy="40" r="20" fill="#10B981" opacity="0.2"/>
      <text x="35" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6EE7B7">1</text>
      <text x="70" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#A7F3D0">Escopo estreito e bem definido</text>
      <text x="70" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#D1FAE5">Agentes que fazem uma coisa sobrevivem</text>
      <text x="70" y="63" font-family="system-ui, sans-serif" font-size="11" fill="#D1FAE5">3-5x mais que agentes generico</text>
    </g>

    <!-- Pattern 2: HITL -->
    <g transform="translate(10, 140)">
      <rect x="0" y="0" width="490" height="80" rx="10" fill="#064E3B" stroke="#10B981" stroke-width="1" opacity="0.4"/>
      <circle cx="35" cy="40" r="20" fill="#10B981" opacity="0.2"/>
      <text x="35" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6EE7B7">2</text>
      <text x="70" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#A7F3D0">Human-in-the-loop</text>
      <text x="70" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#D1FAE5">Checkpoints humanos em passos</text>
      <text x="70" y="63" font-family="system-ui, sans-serif" font-size="11" fill="#D1FAE5">consequenciais: 2-3x mais longevos</text>
    </g>

    <!-- Pattern 3: Eval suite -->
    <g transform="translate(10, 230)">
      <rect x="0" y="0" width="490" height="80" rx="10" fill="#064E3B" stroke="#10B981" stroke-width="1" opacity="0.4"/>
      <circle cx="35" cy="40" r="20" fill="#10B981" opacity="0.2"/>
      <text x="35" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6EE7B7">3</text>
      <text x="70" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#A7F3D0">Avaliacao continua</text>
      <text x="70" y="48" font-family="system-ui, sans-serif" font-size="11" fill="#D1FAE5">Eval suites + trace replay reduzem</text>
      <text x="70" y="63" font-family="system-ui, sans-serif" font-size="11" fill="#D1FAE5">deprecacao em 2x vs sem infra</text>
    </g>

    <!-- Timeline -->
    <text x="255" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="1">TIMELINE PILOTO -> PRODUCAO (SUCESSO)</text>

    <g transform="translate(10, 350)">
      <!-- Timeline bar -->
      <rect x="0" y="0" width="490" height="8" rx="4" fill="#1E293B"/>
      <rect x="0" y="0" width="70" height="8" rx="4" fill="#3B82F6" opacity="0.7"/>
      <rect x="70" y="0" width="140" height="8" rx="0" fill="#F59E0B" opacity="0.7"/>
      <rect x="210" y="0" width="105" height="8" rx="0" fill="#EF4444" opacity="0.7"/>
      <rect x="315" y="0" width="70" height="8" rx="0" fill="#10B981" opacity="0.7"/>
      <rect x="385" y="0" width="105" height="8" rx="4" fill="#059669" opacity="0.7"/>

      <text x="35" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#93C5FD">Demo</text>
      <text x="35" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748B">2-4 sem</text>

      <text x="140" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FCD34D">Piloto</text>
      <text x="140" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748B">2-4 meses</text>

      <text x="262" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#FCA5A5">Hardening</text>
      <text x="262" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748B">2-3 meses</text>

      <text x="350" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6EE7B7">Rollout</text>
      <text x="350" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748B">1-2 meses</text>

      <text x="437" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6EE7B7">Producao</text>
      <text x="437" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748B">continuo</text>

      <!-- Warning marker on hardening -->
      <text x="262" y="-6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#EF4444">! fase que mata</text>
    </g>

    <!-- Source -->
    <text x="255" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Fonte: Presenc AI, 60+ enterprise deployments 2026</text>
  </g>

  <!-- Bottom data points -->
  <g transform="translate(60, 540)">
    <!-- Data point 1: APEX-Agents -->
    <rect x="0" y="0" width="350" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="15" y="22" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#EF4444">24%</text>
    <text x="15" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">tarefas completas na 1a tentativa (melhor modelo)</text>
    <text x="15" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">APEX-Agents Benchmark, Mercor 2026</text>

    <!-- Data point 2: Gartner -->
    <rect x="370" y="0" width="350" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="385" y="22" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#3B82F6">80%</text>
    <text x="385" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">dos governos com agentes IA ate 2028</text>
    <text x="385" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Gartner, marco 2026</text>

    <!-- Data point 3: BCG/McKinsey -->
    <rect x="740" y="0" width="350" height="60" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="755" y="22" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#F59E0B">60-72%</text>
    <text x="755" y="40" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">dos pilotos travam antes da producao</text>
    <text x="755" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">BCG / McKinsey / IDC 2026</text>
  </g>

  <!-- BaXiJen watermark -->
  <text x="1140" y="620" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#475569" opacity="0.5">BaXiJen</text>
</svg>